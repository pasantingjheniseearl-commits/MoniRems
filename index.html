<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DEPOT/OS — Warehouse Monitor</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%23FF8A3D'/%3E%3Cpath d='m7.5 4.27 9 5.15' stroke='%231C1017' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z' stroke='%231C1017' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='m3.3 7 8.7 5 8.7-5' stroke='%231C1017' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M12 22V12' stroke='%231C1017' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#14171D; --panel:#1E222B; --panel-2:#181C24; --field:#161A21;
    --line:#2A2F3A; --line-2:#20242E; --text:#E8EAED; --muted:#8A93A3; --dim:#5A6272;
    --accent:#FF8A3D; --accent-dk:#3A2617; --accent-bd:#4A331F;
    --ok:#4DD9C7; --ok-dk:#12312C; --ok-bd:#1E4A42;
    --danger:#FF6B6F; --danger-dk:#2A1416; --danger-bd:#5C2226;
    --violet:#9E8CFF; --violet-dk:#251F3D; --violet-bd:#3C3466;
    --on-accent:#1C1017; --overlay:rgba(6,8,11,.55); --overlay-2:rgba(6,8,11,.6);
    --scrollbar:#2A2F3A; --nav-text:#B4BAC5; --nav-hover-bg:#1F2430; --tag-bg:#2A2F3A; --tag-dot-bg:#0F1115;
    --row-hover:#20242E; --sidebar-shadow:rgba(0,0,0,.4);
    --sidebar-w:64px; --sidebar-w-open:236px;
  }
  /* Warm, low-glare light theme — intentionally not pure white to ease long viewing sessions */
  [data-theme="light"]{
    --bg:#EFEAE0; --panel:#F8F5EF; --panel-2:#E7E1D3; --field:#FBF9F4;
    --line:#DCD3C0; --line-2:#E4DCC9; --text:#2E2B23; --muted:#736B5A; --dim:#A79E88;
    --accent:#A85114; --accent-dk:#FCE6CC; --accent-bd:#F0C495;
    --ok:#137A6B; --ok-dk:#DCF2EC; --ok-bd:#B7E1D6;
    --danger:#B23539; --danger-dk:#FBE6E6; --danger-bd:#EFC0C1;
    --violet:#5A3FCB; --violet-dk:#EAE4FA; --violet-bd:#D1C4F2;
    --on-accent:#FFFFFF; --overlay:rgba(40,34,22,.35); --overlay-2:rgba(40,34,22,.4);
    --scrollbar:#D8CFBB; --nav-text:#5B5546; --nav-hover-bg:#E4DCC9; --tag-bg:#EDE6D6; --tag-dot-bg:#F8F5EF;
    --row-hover:#EDE6D6; --sidebar-shadow:rgba(60,50,30,.12);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;transition:background .15s,color .15s;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:4px;}
  input,select,button,textarea{font-family:inherit;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
  input,select,textarea{
    background:var(--field); border:1px solid var(--line); border-radius:3px;
    padding:9px 12px; font-size:13.5px; color:var(--text); outline:none; width:100%; min-width:0;
  }
  textarea{resize:vertical;font-family:inherit;}
  input::placeholder,textarea::placeholder{color:var(--dim);}
  input:focus,select:focus,textarea:focus{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent);}
  input:disabled{opacity:.55;cursor:not-allowed;}
  label.field{display:flex;flex-direction:column;gap:5px;font-size:13px;min-width:0;}
  label.field .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
  button{cursor:pointer;border:none;font-size:13.5px;}
  .btn{
    font-size:13.5px;font-weight:500;padding:9px 15px;border-radius:3px;
    display:inline-flex;align-items:center;gap:7px;justify-content:center;transition:.15s;white-space:nowrap;
  }
  .btn-primary{background:var(--accent);color:var(--on-accent);}
  .btn-primary:hover{filter:brightness(1.1);}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger-bd);}
  .btn-danger:hover{background:var(--danger-dk);}
  .btn-sm{padding:6px 11px;font-size:12.5px;}
  .icon-btn{background:none;color:var(--dim);padding:5px;display:inline-flex;border-radius:3px;transition:.15s;}
  .icon-btn:hover{color:var(--danger);background:var(--danger-dk);}
  .icon-btn.edit:hover{color:var(--accent);background:var(--accent-dk);}
  .icon-btn.msg:hover{color:var(--ok);background:var(--ok-dk);}
  .icon-btn.theme:hover{color:var(--accent);background:var(--accent-dk);}

  .tag{
    position:relative;display:inline-flex;align-items:center;gap:5px;
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.02em;
    padding:4px 9px 4px 12px;border:1px solid var(--line);border-radius:2px;
    background:var(--tag-bg);color:var(--text);white-space:nowrap;
  }
  .tag::before{content:"";position:absolute;left:-3px;top:50%;transform:translateY(-50%);
    width:5px;height:5px;border-radius:50%;background:var(--tag-dot-bg);border:1px solid currentColor;}
  .tag-accent{background:var(--accent-dk);color:var(--accent);border-color:var(--accent-bd);}
  .tag-ok{background:var(--ok-dk);color:var(--ok);border-color:var(--ok-bd);}
  .tag-danger{background:var(--danger-dk);color:var(--danger);border-color:var(--danger-bd);}
  .tag-violet{background:var(--violet-dk);color:var(--violet);border-color:var(--violet-bd);}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:5px 10px;border-radius:20px;
    background:var(--field);border:1px solid var(--line);color:var(--muted);}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:16px;min-width:0;}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px;}
  thead tr{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    background:var(--panel-2);border-bottom:1px solid var(--line);}
  th{padding:9px 14px;white-space:nowrap;}
  td{padding:9px 14px;border-bottom:1px solid var(--line-2);}
  tr:last-child td{border-bottom:none;}
  .pager{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:12px;font-size:12px;color:var(--muted);flex-wrap:wrap;}

  /* ---- virtualized / windowed lists ---- */
  .vtable{border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--panel);}
  .vtable-hscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .vtable-head{display:grid;background:var(--panel-2);border-bottom:1px solid var(--line);
    font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
  .vtable-head > div{padding:9px 14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;}
  .vtable-viewport{position:relative;overflow-y:auto;overflow-x:hidden;}
  .vtable-spacer{position:relative;}
  .vtable-rows{position:absolute;left:0;right:0;top:0;will-change:transform;}
  .vrow{display:grid;height:42px;border-bottom:1px solid var(--line-2);font-size:13.5px;}
  .vrow:hover{background:var(--row-hover);}
  .vrow > div{padding:0 14px;display:flex;align-items:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .vtable-empty{padding:44px 20px;text-align:center;color:var(--dim);font-size:13px;}

  /* ---- layout ---- */
  #app{min-height:100vh;width:100%;}
  .shell{display:flex;min-height:100vh;}
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:100;
    background:var(--panel-2);border-right:1px solid var(--line);
    display:flex;flex-direction:column;overflow:hidden;transition:width .18s ease;
  }
  .sidebar:hover,.sidebar:focus-within{width:var(--sidebar-w-open);box-shadow:6px 0 28px var(--sidebar-shadow);}
  .hide-collapsed{opacity:0;max-width:0;overflow:hidden;white-space:nowrap;transition:opacity .12s ease,max-width .18s ease;}
  .sidebar:hover .hide-collapsed,.sidebar:focus-within .hide-collapsed{opacity:1;max-width:180px;}
  .brand{padding:18px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .brand-mark{width:32px;height:32px;flex-shrink:0;border-radius:3px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:var(--on-accent);}
  .brand-name{font-size:13.5px;font-weight:600;letter-spacing:-.01em;}
  .brand-sub{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;}
  .nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:3px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:3px;font-size:13.5px;
    color:var(--nav-text);border:1px solid transparent;text-align:left;background:none;width:100%;}
  .nav-item:hover{background:var(--nav-hover-bg);}
  .nav-item.active{background:var(--accent-dk);color:var(--accent);border-color:var(--accent-bd);}
  .nav-item svg{flex-shrink:0;}
  .sidebar-foot{padding:14px 12px;border-top:1px solid var(--line);}
  .who{display:flex;align-items:center;gap:8px;padding:0 8px;margin-bottom:12px;}
  .dot{width:8px;height:8px;flex-shrink:0;border-radius:50%;background:var(--ok);}
  .who-name{font-size:12.5px;font-weight:500;}
  .who-role{font-size:11px;color:var(--muted);}

  .main{flex:1;min-width:0;margin-left:var(--sidebar-w);display:flex;flex-direction:column;min-height:100vh;}
  .topbar{min-height:56px;border-bottom:1px solid var(--line);display:flex;align-items:center;
    justify-content:space-between;padding:10px 24px;flex-shrink:0;gap:12px;flex-wrap:wrap;}
  .content{flex:1;overflow-y:auto;padding:24px;}
  h1.page-title{font-size:17px;font-weight:600;letter-spacing:-.01em;margin:0 0 4px;}
  p.page-sub{font-size:13.5px;color:var(--muted);margin:0;}
  .stripe{position:fixed;top:0;left:0;width:100%;height:6px;z-index:300;
    background:repeating-linear-gradient(45deg,var(--accent) 0,var(--accent) 10px,var(--on-accent) 10px,var(--on-accent) 20px);}

  .grid{display:grid;gap:14px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-2{grid-template-columns:repeat(2,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  @media(max-width:900px){
    .grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:1fr;}
    .dash-row{grid-template-columns:1fr !important;}
  }
  @media(max-width:520px){.grid-4{grid-template-columns:1fr;}}

  .stat-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);}
  .stat-value{font-size:24px;font-weight:600;font-family:'IBM Plex Mono',monospace;margin-top:8px;word-break:break-word;}
  .stat-sub{font-size:11px;color:var(--muted);margin-top:6px;}

  .toast{margin-bottom:16px;padding:10px 16px;border-radius:3px;font-size:13.5px;border:1px solid;}
  .toast-ok{background:var(--ok-dk);border-color:var(--ok-bd);color:var(--ok);}
  .toast-danger{background:var(--danger-dk);border-color:var(--danger-bd);color:var(--danger);}

  .chart-wrap{height:230px;display:flex;align-items:flex-end;gap:14px;padding-top:10px;min-width:280px;}
  .chart-day{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px;}
  .bars{display:flex;align-items:flex-end;gap:4px;height:100%;width:100%;justify-content:center;}
  .bar{width:16px;border-radius:2px 2px 0 0;transition:height .3s;}
  .bar-in{background:var(--ok);}
  .bar-out{background:var(--accent);}
  .chart-daylabel{font-size:11px;color:var(--dim);}

  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .auth-box{width:100%;max-width:420px;}
  .auth-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:26px;}
  .tabs{display:flex;gap:4px;background:var(--field);border-radius:3px;padding:4px;margin-bottom:22px;}
  .tab-btn{flex:1;padding:9px;font-size:13.5px;border-radius:3px;background:none;color:var(--muted);}
  .tab-btn.active{background:var(--accent);color:var(--on-accent);font-weight:600;}
  .role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .role-opt{padding:9px 6px;font-size:11.5px;border-radius:3px;border:1px solid var(--line);background:none;color:var(--muted);}
  .role-opt.active{border-color:var(--accent);background:var(--accent-dk);color:var(--accent);}

  .stockin-tabs{display:flex;background:var(--field);border:1px solid var(--line);border-radius:3px;padding:4px;width:fit-content;flex-wrap:wrap;}
  .stockin-tab{padding:9px 15px;font-size:13.5px;border-radius:3px;background:none;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .stockin-tab.active-in{background:var(--ok-dk);color:var(--ok);}
  .stockin-tab.active-out{background:var(--accent-dk);color:var(--accent);}

  .row-grid{display:grid;grid-template-columns:2fr 3fr 1fr 1.4fr 2fr 28px;gap:10px;align-items:center;margin-bottom:8px;}
  .row-grid.single{grid-template-columns:2fr 3fr 1fr 1.4fr 3fr;}
  .row-head{display:grid;grid-template-columns:2fr 3fr 1fr 1.4fr 2fr 28px;gap:10px;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;padding:0 2px;}
  .row-head.single{grid-template-columns:2fr 3fr 1fr 1.4fr 3fr;}
  @media(max-width:700px){
    .row-grid,.row-grid.single,.row-head,.row-head.single{grid-template-columns:1fr;}
    .row-head{display:none;}
  }

  .user-chip{display:flex;align-items:center;gap:8px;background:var(--field);border:1px solid var(--line);border-radius:3px;padding:8px 12px;font-size:12.5px;}
  .role-pill{font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid;white-space:nowrap;}

  .checkbox-row{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--nav-text);cursor:pointer;user-select:none;}
  .checkbox-row input{width:auto;accent-color:var(--accent);}

  .avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;flex-shrink:0;}
  .avatar-sm{width:32px;height:32px;font-size:12px;}
  hr.sep{border:none;border-top:1px solid var(--line);margin:16px 0;}

  /* team / online button + slideover */
  .team-btn{display:flex;align-items:center;gap:8px;background:var(--field);border:1px solid var(--line);border-radius:20px;padding:6px 14px 6px 6px;}
  .team-btn:hover{border-color:var(--ok-bd);}
  .stack-avatars{display:flex;}
  .stack-avatars .avatar-sm{margin-left:-8px;border:2px solid var(--panel-2);}
  .stack-avatars .avatar-sm:first-child{margin-left:0;}
  .unread-badge{position:absolute;top:-5px;right:-5px;min-width:17px;height:17px;padding:0 4px;border-radius:9px;
    background:var(--danger);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;
    border:2px solid var(--bg);line-height:1;}
  .team-row-badge{min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--danger);color:#fff;
    font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  .backdrop{position:fixed;inset:0;background:var(--overlay);z-index:190;opacity:0;pointer-events:none;transition:opacity .18s;}
  .backdrop.open{opacity:1;pointer-events:auto;}
  .panel{position:fixed;top:0;right:0;bottom:0;width:360px;max-width:92vw;background:var(--panel-2);
    border-left:1px solid var(--line);z-index:200;transform:translateX(100%);transition:transform .2s ease;
    display:flex;flex-direction:column;}
  .panel.open{transform:translateX(0);}
  .panel-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .panel-body{flex:1;overflow-y:auto;padding:14px;}
  .panel-note{padding:10px 14px;font-size:11px;color:var(--muted);border-top:1px solid var(--line);background:var(--panel);flex-shrink:0;}
  .team-row{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:5px;}
  .team-row:hover{background:var(--field);}
  .msg-thread{display:flex;flex-direction:column;gap:10px;padding:4px 2px;}
  .msg-bubble{max-width:80%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.4;}
  .msg-me{align-self:flex-end;background:var(--accent-dk);color:var(--text);border:1px solid var(--accent-bd);border-bottom-right-radius:2px;}
  .msg-them{align-self:flex-start;background:var(--field);border:1px solid var(--line);border-bottom-left-radius:2px;}
  .msg-time{font-size:10px;color:var(--dim);margin-top:3px;}
  .chat-input-row{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line);flex-shrink:0;}

  /* modal */
  .modal-backdrop{position:fixed;inset:0;background:var(--overlay-2);z-index:250;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:22px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 4px;font-size:15px;font-weight:600;}
  .modal p.hint{margin:0 0 18px;font-size:12.5px;color:var(--muted);}

  .banner{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:4px;border:1px solid var(--violet-bd);
    background:var(--violet-dk);color:var(--violet);font-size:12.5px;margin-bottom:16px;line-height:1.5;}

  /* barcode banner (Stock In/Out only) */
  .barcode-banner{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:1px solid var(--accent-bd);
    background:var(--accent-dk);border-radius:6px;margin-bottom:16px;}
  .barcode-row{display:flex;gap:10px;margin-top:10px;}
  @media(max-width:560px){.barcode-row{flex-direction:column;}}

  ::selection{background:var(--accent);color:var(--on-accent);}
</style>
</head>
<body>
<div class="stripe" id="stripe" style="display:none;"></div>
<div id="app"></div>

<script>
/* =============================================================
   DEPOT/OS — Warehouse Monitor
   Single-file prototype: state object + string-template render
   functions + one delegated event listener. No build step.

   EXTENDING THIS APP
   1. Add a nav item in renderShell()'s navItems array (gate by role).
   2. Add a case in renderView() pointing at a render<Name>() function.
   3. Write render<Name>() following the existing render* functions.
   4. Wire new buttons/inputs through attachHandlers() — add a branch
      keyed on data-action (clicks) or element id (input/change).
   State lives in one place: `state` below. Mutate it directly, then
   call render() for a full repaint, or a targeted update function
   (updateLookupResults, mountLookupVirtualList, mountTxVirtualList)
   for high-frequency updates like search-as-you-type, so typing
   doesn't repaint the whole app on every keystroke.
============================================================= */

/* ---------------------------------------------------------
   ICONS (inline SVG, stroke-based)
--------------------------------------------------------- */
const ICONS = {

function manilaDateKey(date) {
  return new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Manila", year: "numeric", month: "2-digit", day: "2-digit" }).format(date);
}
function fmt(daysAgo = 0, h, m) {
  const d = new Date(Date.now() - daysAgo * 86400000);
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: "Asia/Manila", year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hourCycle: "h23",
  }).formatToParts(d).reduce((acc, p) => { acc[p.type] = p.value; return acc; }, {});
  const hh = h !== undefined ? String(h).padStart(2, "0") : parts.hour;
  const mm = h !== undefined ? String(m ?? 0).padStart(2, "0") : parts.minute;
  return `${parts.year}-${parts.month}-${parts.day} ${hh}:${mm}`;
}
function dayKeyOf(str){ return str.slice(0,10); }
function daysBetween(tsStr){
  // Stored timestamps are Asia/Manila wall-clock time (fixed UTC+8, no DST).
  const then = new Date(tsStr.replace(" ","T") + "+08:00");
  return (Date.now() - then.getTime()) / (1000*60*60*24);
}

function mapProfile(p) {

function mapTxRow(t) {

    user: t.user_name, value: Number(t.value), timestamp: t.timestamp, inputMethod: t.input_method,
    prefix: t.prefix, suffix: t.suffix, fullBarcodeFormatted: t.full_barcode_formatted, rawInput: t.raw_input };
}
function mapAdjRow(a) {

    qtyBefore: a.qty_before, qtyAfter: a.qty_after, notes: a.notes, user: a.user_name, timestamp: a.timestamp };
}
function syncSearchCache(item) {
  item._skuLc = (item.sku||"").toLowerCase();
  item._descLc = (item.description||"").toLowerCase();
  return item;
}
function mapInvRow(i) {
  return syncSearchCache({ sku: i.sku, description: i.description, category: i.category, locator: i.locator, qty: i.qty, unitValue: Number(i.unit_value), reorder: i.reorder });
}
function mapSkuLocRow(l) {

async function loadProfilesOnly() {
  const { data, error } = await sb.from("profiles").select("*").order("name");
  if (!error) state.users = (data || []).map(mapProfile);
}

async function fetchAllRows(table, orderCol) {
  const pageSize = 1000;
  let all = [], from = 0;
  while (true) {
    const { data, error } = await sb.from(table).select("*").order(orderCol).range(from, from + pageSize - 1);
    if (error) return { data: all, error };
    all = all.concat(data || []);
    if (!data || data.length < pageSize) break;
    from += pageSize;
  }
  return { data: all, error: null };
}
async function loadAllData() {
  const [profilesRes, categoriesRes, locatorsRes, inventoryRes, skuLocRes, txRes, adjRes, logsRes, msgRes] = await Promise.all([
    sb.from("profiles").select("*").order("name"),
    sb.from("categories").select("*").order("name"),
    sb.from("locators").select("*").order("code"),
    fetchAllRows("inventory", "sku"),
    sb.from("sku_locations").select("*"),
    sb.from("transactions").select("*").order("created_at", { ascending: false }).limit(1000),
    sb.from("adjustments").select("*").order("created_at", { ascending: false }).limit(500),
    sb.from("login_logs").select("*").order("created_at", { ascending: false }).limit(300),
    sb.from("messages").select("*").or(`from_id.eq.${state.session.id},to_id.eq.${state.session.id}`).order("created_at", { ascending: true }),
  ]);
  state.users = (profilesRes.data || []).map(mapProfile);
  state.categories = (categoriesRes.data || []).map(c => c.name);
  state.locators = (locatorsRes.data || []).map(l => ({ code: l.code, zone: l.zone, description: l.description }));
  state.inventory = (inventoryRes.data || []).map(mapInvRow);
  state.skuLocations = (skuLocRes.data || []).map(mapSkuLocRow);
  state.transactions = (txRes.data || []).map(mapTxRow);
  state.adjustments = (adjRes.data || []).map(mapAdjRow);
  state.loginLogs = (logsRes.data || []).map(l => ({ user: l.user_name, role: l.role, action: l.action, timestamp: l.timestamp }));
  state.messages = (msgRes.data || []).map(m => ({ id: m.id, from: m.from_id, to: m.to_id, text: m.text, timestamp: m.timestamp, read: !!m.read }));
}

function subscribeRealtime() {
  unsubscribeRealtime();
  const profCh = sb.channel("profiles-changes")
    .on("postgres_changes", { event: "*", schema: "public", table: "profiles" }, () => { loadProfilesOnly().then(render); })
    .subscribe();
  const msgCh = sb.channel("messages-changes")
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages" }, (payload) => {
      const m = payload.new;
      if (!state.session) return;
      if (m.from_id === state.session.id || m.to_id === state.session.id) {
        if (!state.messages.some(x => x.id === m.id)) {
          const incoming = m.to_id === state.session.id;
          const viewingThisThread = incoming && state.teamPanelOpen && state.chatWith === m.from_id;
          state.messages.push({ id: m.id, from: m.from_id, to: m.to_id, text: m.text, timestamp: m.timestamp, read: !incoming || viewingThisThread });
          if (incoming && viewingThisThread) {
            sb.from("messages").update({ read: true }).eq("id", m.id);
          } else if (incoming) {
            const sender = state.users.find(u => u.id === m.from_id);
            showToast(`New message from ${sender ? sender.name : "a teammate"}`, "ok");
          }
          render();
        }
      }
    })
    .subscribe();
  _rtChannels = [profCh, msgCh];
}
function unsubscribeRealtime() {
  _rtChannels.forEach(ch => sb.removeChannel(ch));
  _rtChannels = [];
}

function showToast(msg, tone) {
  state.toast = { msg, tone };
  render();
  setTimeout(() => { state.toast = null; render(); }, 2600);
}

function roleColor(role) {

function esc(s){ return String(s ?? "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function isAdmin(){ return !!state.session && state.session.role === "Admin"; }
function canAdjust(){ return !!state.session && (state.session.role === "Admin" || state.session.role === "Stock Clerk"); }

/* ---------------------------------------------------------
   MESSAGE RETENTION (auto-purge after 3 months / ~90 days)
   This hides expired messages from the UI immediately. To also
   delete them at rest in Postgres, enable the optional pg_cron
   job included at the bottom of depotos_schema.sql.
--------------------------------------------------------- */
function purgeOldMessages() {
  const before = state.messages.length;
  state.messages = state.messages.filter(m => daysBetween(m.timestamp) <= 90);
  return before - state.messages.length;
}

/* ---------------------------------------------------------
   AUTH ACTIONS — backed by Supabase Auth (auth.users + profiles)
--------------------------------------------------------- */
async function doLogin(usernameOrEmail, password) {
  try {
    let email = usernameOrEmail;
    if (!email.includes("@")) {
      const { data: prof } = await sb.from("profiles").select("email").eq("username", usernameOrEmail).maybeSingle();
      if (!prof) { showToast("No account with that username", "danger"); return; }
      email = prof.email;
    }
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showToast(error.message, "danger"); return; }
    const { data: prof } = await sb.from("profiles").select("*").eq("id", data.user.id).single();
    // Only the first signup (Admin) is auto-approved. All others require admin approval.
    if (!prof.approved) {
      await sb.auth.signOut();
      showToast("Your account is waiting on admin approval. Try again once you've been approved.", "danger");
      return;
    }
    await sb.from("profiles").update({ status: "online", last_login: fmt(0) }).eq("id", data.user.id);
    await sb.from("login_logs").insert({ user_name: prof.name, role: prof.role, action: "Signed in", timestamp: fmt(0) });
    state.session = mapProfile({ ...prof, status: "online", last_login: fmt(0) });
    state.view = "dashboard";
    await loadAllData();
    subscribeRealtime();
    render();
  } catch (err) {
    showToast(err.message || "Sign-in failed", "danger");
  }
}
async function doSignup(payload) {
  try {
    const { data, error } = await sb.auth.signUp({
      email: payload.email,
      password: payload.password,
      options: { data: { name: payload.name, username: payload.username, role: payload.role } },
    });
    if (error) { showToast(error.message, "danger"); return; }
    if (!data.session) {
      showToast("Account created. Once an admin approves it, you'll be able to sign in.", "ok");
      state.authMode = "login";
      render();
      return;
    }
    const { data: prof } = await sb.from("profiles").select("*").eq("id", data.user.id).single();
    if (!prof.approved) {
      await sb.auth.signOut();
      showToast("Account created — an admin needs to approve it before you can sign in.", "ok");
      state.authMode = "login";
      render();
      return;
    }
    // First signup only: auto-approved as Admin. Password is encrypted by Supabase.
    // This is the ONLY admin account in the system. All other signups require approval.
    await sb.from("profiles").update({ status: "online", last_login: fmt(0) }).eq("id", data.user.id);
    await sb.from("login_logs").insert({ user_name: prof.name, role: prof.role, action: "Account created & signed in", timestamp: fmt(0) });
    state.session = mapProfile({ ...prof, status: "online", last_login: fmt(0) });
    state.view = "dashboard";
    await loadAllData();
    subscribeRealtime();
    render();
  } catch (err) {
    showToast(err.message || "Sign-up failed", "danger");
  }
}
async function doLogout() {
  try {
    if (state.session) {
      await sb.from("profiles").update({ status: "offline" }).eq("id", state.session.id);
      await sb.from("login_logs").insert({ user_name: state.session.name, role: state.session.role, action: "Signed out", timestamp: fmt(0) });
    }
    await sb.auth.signOut();
  } catch (err) { /* proceed to local sign-out regardless */ }
  unsubscribeRealtime();
  state.session = null;
  state.authMode = "login";
  state.teamPanelOpen = false;
  state.chatWith = null;
  render();
}

/* Restore session (or show sign-in) on page load. */
function applyTheme() {
  document.documentElement.setAttribute("data-theme", state.theme);
}
applyTheme();
async function boot() {
  state.loading = true; state.connectionError = null;
  render();
  try {
    const { data: { session }, error } = await sb.auth.getSession();
    if (error) throw error;
    if (session) {
      const { data: prof, error: profErr } = await sb.from("profiles").select("*").eq("id", session.user.id).single();
      if (profErr) throw profErr;
      state.session = mapProfile(prof);
      await loadAllData();
      subscribeRealtime();
    }
  } catch (err) {
    state.connectionError = err.message || String(err);
  }
  state.loading = false;
  render();
}
sb.auth.onAuthStateChange((event) => {
  if (event === "SIGNED_OUT" && state.session) {
    state.session = null;
    unsubscribeRealtime();
    render();
  }
});

/* ---------------------------------------------------------
   RENDER: ROOT
--------------------------------------------------------- */
function render() {
  const app = document.getElementById("app");
  document.getElementById("stripe").style.display = (state.session && !state.loading) ? "none" : "block";
  if (state.connectionError) { app.innerHTML = renderConnectionError(); return; }
  if (state.loading) { app.innerHTML = renderLoading(); return; }
  purgeOldMessages();
  app.innerHTML = state.session ? renderShell() : renderAuth();
  attachHandlers();
  syncScannerMode();
  if (state.session) {
    if (state.view === "lookup") mountLookupVirtualList();
    if (state.view === "transactions" && state.txTab === "stock") mountTxVirtualList();
  }
}
function renderLoading() {
  return `<div class="auth-wrap"><div style="text-align:center;color:var(--muted);font-size:13.5px;display:flex;flex-direction:column;align-items:center;gap:14px;">
    <div class="brand-mark">${ICONS.package}</div>

  </div></div>`;
}
function renderConnectionError() {
  return `<div class="auth-wrap"><div class="auth-card" style="max-width:420px;text-align:center;">

}

/* ---------------------------------------------------------
   TEAM PANEL + MESSAGING
--------------------------------------------------------- */
function unreadCountFrom(userId) {
  return state.messages.filter(m => m.from === userId && m.to === state.session.id && !m.read).length;
}
function totalUnreadCount() {
  return state.messages.filter(m => m.to === state.session.id && !m.read).length;
}
function markThreadRead(userId) {
  const toMark = state.messages.filter(m => m.from === userId && m.to === state.session.id && !m.read);
  if (toMark.length === 0) return;
  toMark.forEach(m => m.read = true);
  sb.from("messages").update({ read: true }).eq("from_id", userId).eq("to_id", state.session.id).eq("read", false);
}
function renderTeamPanel() {
  const open = state.teamPanelOpen;
  const chattingWith = state.chatWith ? state.users.find(u => u.id === state.chatWith) : null;

  let body;
  if (chattingWith) {
    const thread = state.messages
      .filter(m => (m.from === state.session.id && m.to === chattingWith.id) || (m.from === chattingWith.id && m.to === state.session.id))
      .sort((a,b) => a.timestamp.localeCompare(b.timestamp));
    body = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <button class="icon-btn" style="color:var(--text);" data-action="back-to-team-list">${ICONS.back}</button>

        <div>
          <div style="font-size:13px;font-weight:500;">${esc(chattingWith.name)}</div>

        ${thread.length === 0 ? `<div style="font-size:12.5px;color:var(--dim);text-align:center;padding:20px 0;">No messages yet — say hello.</div>` :

/* ---------------------------------------------------------
   DASHBOARD
--------------------------------------------------------- */
function computeCategoryStats() {
  return state.categories.map(cat => {
    const items = state.inventory.filter(i => i.category === cat);
    const qty = items.reduce((s,i)=>s+i.qty,0);
    const value = items.reduce((s,i)=>s+i.qty*i.unitValue,0);
    return { category: cat, skuCount: items.length, qty, value };
  });
}

function renderDashboard() {
  const now = new Date();
  const isThisMonth = (t) => {
    const nowKey = manilaDateKey(now);
    return t.timestamp.slice(0,7) === nowKey.slice(0,7);
  };
  const mtdIn = state.transactions.filter(t => t.type === "IN" && isThisMonth(t));
  const mtdOut = state.transactions.filter(t => t.type === "OUT" && isThisMonth(t));
  const mtdInValue = mtdIn.reduce((s,t)=>s+t.value,0);
  const mtdOutValue = mtdOut.reduce((s,t)=>s+t.value,0);
  const lowStock = state.inventory.filter(i => i.qty <= i.reorder);
  const totalValue = state.inventory.reduce((s,i)=>s+i.qty*i.unitValue,0);

  const days = [...Array(7)].map((_, idx) => {
    const d = new Date(Date.now() - (6-idx) * 86400000);
    const label = new Intl.DateTimeFormat("en-US", { timeZone: "Asia/Manila", weekday: "short" }).format(d);
    const key = manilaDateKey(d);
    const inCount = state.transactions.filter(t => t.type==="IN" && dayKeyOf(t.timestamp)===key).length;
    const outCount = state.transactions.filter(t => t.type==="OUT" && dayKeyOf(t.timestamp)===key).length;
    return { label, inCount, outCount };
  });
  const maxCount = Math.max(1, ...days.map(d => Math.max(d.inCount, d.outCount)));

  const perLocator = state.locators.map(loc => {
    const items = state.inventory.filter(i => i.locator === loc.code);
    const value = items.reduce((s,i)=>s+i.qty*i.unitValue,0);
    return { ...loc, skuCount: items.length, value };
  });

  const perCategory = computeCategoryStats();
  const maxCatValue = Math.max(1, ...perCategory.map(c => c.value));

  return `
    <div style="margin-bottom:20px;">
      <h1 class="page-title">Dashboard</h1>
      <p class="page-sub">Live snapshot of stock movement, value, category mix and location coverage.</p>
    </div>

    <div class="grid grid-4" style="margin-bottom:16px;">
      ${statCard(ICONS.down, "Stock In (MTD)", mtdIn.length, `₱${mtdInValue.toLocaleString()} received`, "ok")}
      ${statCard(ICONS.up, "Stock Out (MTD)", mtdOut.length, `₱${mtdOutValue.toLocaleString()} released`, "accent")}
      ${statCard(ICONS.alert, "Low-stock SKUs", lowStock.length, "At or below reorder level", "danger")}
      ${statCard(ICONS.layers, "Total inventory value", `₱${totalValue.toLocaleString()}`, `${state.inventory.length} SKUs · ${state.categories.length} categories`, "")}
    </div>

    <div class="grid dash-row" style="grid-template-columns:2fr 1fr;margin-bottom:16px;">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:8px;">
          <h2 style="font-size:13.5px;font-weight:600;margin:0;">In / Out frequency — last 7 days</h2>
          <div style="display:flex;gap:12px;font-size:11px;color:var(--muted);">
            <span style="display:flex;align-items:center;gap:5px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--ok);"></span>In</span>
            <span style="display:flex;align-items:center;gap:5px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent);"></span>Out</span>
          </div>
        </div>
        <div class="chart-wrap">
          ${days.map(d => `
            <div class="chart-day">
              <div class="bars">
                <div class="bar bar-in" style="height:${(d.inCount/maxCount*170)||2}px;" title="In: ${d.inCount}"></div>
                <div class="bar bar-out" style="height:${(d.outCount/maxCount*170)||2}px;" title="Out: ${d.outCount}"></div>
              </div>
              <div class="chart-daylabel">${d.label}</div>
            </div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <h2 style="font-size:13.5px;font-weight:600;margin:0;">Low-stock SKUs</h2>
          <span style="color:var(--danger);">${ICONS.alert}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;max-height:230px;overflow-y:auto;">
          ${lowStock.length === 0 ? `<p style="font-size:12px;color:var(--muted);">No SKUs below reorder level.</p>` :
            lowStock.map(i => `
              <div style="display:flex;align-items:center;justify-content:space-between;background:var(--field);border:1px solid var(--line);border-radius:3px;padding:8px 10px;gap:8px;">
                <div style="min-width:0;">
                  <div class="mono" style="font-size:12px;">${esc(i.sku)}</div>
                  <div style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(i.description)}</div>
                </div>
                <span class="tag tag-danger">${i.qty} / ${i.reorder}</span>
              </div>`).join("")}
        </div>
      </div>
    </div>

    <div class="grid dash-row" style="grid-template-columns:1.3fr 1fr;margin-bottom:16px;">
      <div class="card">
        <h2 style="font-size:13.5px;font-weight:600;margin:0 0 10px;">Stock by location</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Locator</th><th>Zone</th><th>SKUs</th><th>Total value</th></tr></thead>
            <tbody>
              ${perLocator.length===0?`<tr><td colspan="4" style="text-align:center;color:var(--dim);padding:20px;">No locators yet — add one under Locators & Categories.</td></tr>`:
              perLocator.map(l => `
                <tr>
                  <td><span class="tag">${esc(l.code)}</span></td>
                  <td style="color:var(--nav-text);">${esc(l.zone)}</td>
                  <td>${l.skuCount}</td>
                  <td class="mono">₱${l.value.toLocaleString()}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <h2 style="font-size:13.5px;font-weight:600;margin:0 0 10px;">Value by category</h2>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${perCategory.length===0?`<p style="font-size:12px;color:var(--muted);">No categories yet — add one under Locators & Categories.</p>`:
          perCategory.map(c => `
            <div>
              <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;gap:8px;">
                <span style="color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.category)}</span>
                <span class="mono" style="color:var(--muted);flex-shrink:0;">₱${c.value.toLocaleString()}</span>
              </div>
              <div style="height:6px;background:var(--field);border-radius:3px;overflow:hidden;">
                <div style="height:100%;width:${(c.value/maxCatValue*100)||0}%;background:var(--accent);border-radius:3px;"></div>
              </div>
              <div style="font-size:10.5px;color:var(--dim);margin-top:3px;">${c.skuCount} SKU${c.skuCount!==1?'s':''} · ${c.qty.toLocaleString()} units</div>
            </div>`).join("")}
        </div>
      </div>
    </div>
  `;
}
function statCard(icon, label, value, sub, tone) {
  const toneColor = tone === "ok" ? "var(--ok)" : tone === "accent" ? "var(--accent)" : tone === "danger" ? "var(--danger)" : "var(--text)";
  return `
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span class="stat-label">${label}</span>
        <span style="color:var(--muted);">${icon}</span>
      </div>
      <div class="stat-value" style="color:${toneColor};">${value}</div>
      <div class="stat-sub">${sub}</div>
    </div>`;
}

/* ---------------------------------------------------------
   INVENTORY LOOKUP (search / filter / import / export / admin edit)
   Rendered as a virtualized (windowed) list: only rows near the
   viewport are ever in the DOM, however large the inventory gets.
--------------------------------------------------------- */
const LOOKUP_COLS = "130px 1fr 160px 120px 90px 110px 120px";
const LOOKUP_COLS_ADMIN = LOOKUP_COLS + " 90px";

function filteredInventory() {
  const q = state.lookupQ.toLowerCase();
  return state.inventory.filter(i => {
    const matchQ = !q || i._skuLc.includes(q) || i._descLc.includes(q);
    const matchLoc = state.lookupLoc === "all" || i.locator === state.lookupLoc;
    const matchCat = state.lookupCat === "all" || i.category === state.lookupCat;
    return matchQ && matchLoc && matchCat;
  });
}

/* Generic windowed-list mounter: renders only rows near the
   scrolled viewport (plus a small buffer), reused by Inventory
   Lookup and the Transaction Log's stock-movements list. */
function mountVirtualList(viewportId, items, rowHeight, renderRowFn, emptyText) {
  const viewport = document.getElementById(viewportId);
  if (!viewport) return;
  const spacer = viewport.querySelector(".vtable-spacer");
  const rowsEl = viewport.querySelector(".vtable-rows");
  const total = items.length;
  spacer.style.height = Math.max(total * rowHeight, 1) + "px";
  function paint() {
    if (total === 0) {
      rowsEl.style.transform = "translateY(0px)";
      rowsEl.innerHTML = `<div class="vtable-empty">${emptyText}</div>`;
      return;
    }
    const scrollTop = viewport.scrollTop;
    const viewH = viewport.clientHeight || rowHeight * 10;
    const buffer = 6;
    const start = Math.max(0, Math.floor(scrollTop / rowHeight) - buffer);
    const count = Math.ceil(viewH / rowHeight) + buffer * 2;
    const end = Math.min(total, start + count);
    rowsEl.style.transform = `translateY(${start * rowHeight}px)`;
    let html = "";
    for (let i = start; i < end; i++) html += renderRowFn(items[i], i);
    rowsEl.innerHTML = html;
  }
  paint();
  viewport.onscroll = () => window.requestAnimationFrame(paint);
}

/* CSV / PDF helpers */
function toCSV(items) {
  const header = ["SKU","Description","Category","Locator","QTY","UnitValue","Reorder"];
  const lines = [header.join(",")];
  items.forEach(i => {
    lines.push([i.sku, `"${(i.description||"").replace(/"/g,'""')}"`, i.category||"", i.locator||"", i.qty, i.unitValue, i.reorder].join(","));
  });
  return lines.join("\n");
}
function downloadBlob(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function exportCSV() {
  const items = filteredInventory();
  downloadBlob(toCSV(items), `inventory-export-${new Date().toISOString().slice(0,10)}.csv`, "text/csv");
  showToast(`Exported ${items.length} SKU(s) to CSV`, "ok");
}
function exportPDF() {
  if (!window.jspdf) { showToast("PDF library still loading — try again in a moment", "danger"); return; }
  const items = filteredInventory();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(9);

  doc.setFont(undefined, "bold");
  headers.forEach((h, idx) => doc.text(h, cols[idx], y));
  doc.setFont(undefined, "normal");

  showToast(`Exported ${items.length} SKU(s) to PDF`, "ok");

function detectCSVDelimiter(headerLine) {
  const commaCount = (headerLine.match(/,/g) || []).length;
  const semiCount = (headerLine.match(/;/g) || []).length;
  return semiCount > commaCount ? ";" : ",";
}
function splitCSVLine(line, delimiter) {
  delimiter = delimiter || ",";
  const result = [];
  let cur = "", inQuotes = false, quoteChar = null;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) {
      if (c === quoteChar) { if (line[i+1] === quoteChar) { cur += quoteChar; i++; } else { inQuotes = false; quoteChar = null; } }
      else cur += c;
    } else {
      if (c === '"' || c === "'") { inQuotes = true; quoteChar = c; }
      else if (c === delimiter) { result.push(cur); cur = ""; }
      else cur += c;
    }
  }
  result.push(cur);
  return result;
}
function parseCSV(text) {
  text = text.replace(/^\uFEFF/, "");
  const lines = text.split(/\r?\n/).filter(l => l.trim().length);
  if (lines.length < 2) return [];
  const delimiter = detectCSVDelimiter(lines[0]);
  const norm = (h) => h.trim().toLowerCase().replace(/[\s_]+/g, "");
  const header = splitCSVLine(lines[0], delimiter).map(norm);
  const idx = (name) => header.indexOf(name);
  const rows = [];
  for (let li = 1; li < lines.length; li++) {
    const cells = splitCSVLine(lines[li], delimiter);
    const clean = cells.map(c => c.trim());
    const sku = clean[idx("sku")];
    if (!sku) continue;
    rows.push({
      sku,
      description: clean[idx("description")] || "",
      category: idx("category")>-1 ? (clean[idx("category")]||"") : "",
      locator: clean[idx("locator")] || "",
      qty: parseInt(clean[idx("qty")],10) || 0,
      unitValue: parseFloat(clean[idx("unitvalue")]) || 0,
      reorder: parseInt(clean[idx("reorder")],10) || 0,
    });
  }
  return rows;
}
async function importCSVFile(file) {
  const text = await file.text();
  let rows = parseCSV(text);
  if (rows.length === 0) { showToast("No valid rows found in that CSV", "danger"); return; }

  const bySku = new Map();
  rows.forEach(r => bySku.set(r.sku, r));
  const dupeCount = rows.length - bySku.size;
  rows = [...bySku.values()];

  const newCats = [...new Set(rows.map(r => r.category).filter(c => c && !state.categories.includes(c)))];
  if (newCats.length) {
    await sb.from("categories").upsert(newCats.map(name => ({ name })), { onConflict: "name" });
    state.categories.push(...newCats);
  }

  const dbRows = rows.map(r => ({
    sku: r.sku, description: r.description, category: r.category || null,
    locator: r.locator || null, qty: r.qty, unit_value: r.unitValue, reorder: r.reorder,
  }));
  const { error } = await sb.from("inventory").upsert(dbRows, { onConflict: "sku" });
  if (error) { showToast(`Import failed: ${error.message}`, "danger"); return; }

  let added = 0, updated = 0;
  rows.forEach(r => {
    const existing = state.inventory.find(i => i.sku === r.sku);
    if (existing) { Object.assign(existing, r, { category: r.category || existing.category }); syncSearchCache(existing); updated++; }
    else { state.inventory.push(syncSearchCache(r)); added++; }
  });
  showToast(`Import complete — ${added} added, ${updated} updated${dupeCount ? ` (${dupeCount} duplicate SKU row(s) skipped, last one kept)` : ""}`, "ok");
  render();
}

/* ---------------------------------------------------------
   BARCODE SCANNER + MANUAL SKU ENTRY — Stock In/Out & Lookup
   -----------------------------------------------------------
   Physical scanners emulate a keyboard, firing digit keydown
   events in rapid succession (well under SCAN_GAP_MS apart)
   followed by Enter. We buffer digits globally while on the
   Stock or Lookup page, validate the 14-digit burst on Enter,
   then parse:
     digits 1–5   → prefix (category)
     digits 6–13  → sku (the only value stored in inventory)
     digit 14     → suffix / check digit
   Manual entry (typed 14-digit code OR 8-digit SKU) goes through
   the same parser via the on-page input box. Listeners — including
   the Ctrl/Cmd+F block and the bare "/" (Firefox quick-find) block —
   attach only while state.view is "stock" or "lookup" and detach
   automatically the moment the user navigates away (see
   syncScannerMode(), called at the end of every render()).
--------------------------------------------------------- */
let _scannerActive = false;
let _scanBuffer = "";
let _scanLastTime = 0;
let _lookupDebounce = null;
let _manualBarcodeDebounce = null;
const SCAN_GAP_MS = 30;

function isEditableFocus() {
  const el = document.activeElement;
  if (!el) return false;
  const tag = el.tagName;
  return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || el.isContentEditable;
}
function scannerKeydownHandler(e) {
  const isFindShortcut = ((e.ctrlKey || e.metaKey) && (e.key === "f" || e.key === "F")) || e.key === "F3";
  if (isFindShortcut) { e.preventDefault(); e.stopPropagation(); return; }
  // Firefox opens "Quick Find" on a bare "/" (or "'" for links-only) when
  // nothing editable has focus — exactly the situation a scanner creates
  // if it fires before anyone has clicked into a field.
  if (!isEditableFocus() && (e.key === "/" || e.key === "'")) { e.preventDefault(); e.stopPropagation(); }
  if (e.target && e.target.id === "barcode-manual-input") return; // manual box handles its own Enter

  if (e.key === "Enter") {
    if (/^\d{14}$/.test(_scanBuffer)) {
      e.preventDefault();
      if (state.view === "lookup") handleLookupScan(_scanBuffer);
      else handleBarcodeInput(_scanBuffer, "scanner");
    }
    _scanBuffer = ""; _scanLastTime = 0;
    return;
  }
  if (/^[0-9]$/.test(e.key)) {
    const now = performance.now();
    if (_scanBuffer.length > 0 && (now - _scanLastTime) > SCAN_GAP_MS) _scanBuffer = "";
    _scanBuffer += e.key;
    if (_scanBuffer.length > 14) _scanBuffer = _scanBuffer.slice(-14);
    _scanLastTime = now;
  } else if (e.key.length === 1) {
    _scanBuffer = ""; // any other printable keystroke breaks a scan burst
  }
}
function handleLookupScan(rawInput) {
  const parsed = parseBarcodeDigits(rawInput);
  if (!parsed) {
    showToast(`Unrecognized code length (${String(rawInput).replace(/\D/g,"").length} digits) — expected 8 or 14`, "danger");
    return;
  }
  state.lookupQ = parsed.sku;
  const item = state.inventory.find(i => i.sku === parsed.sku);
  showToast(item ? `Found ${parsed.sku} — ${item.description}` : `SKU ${parsed.sku} not found in inventory`, item ? "ok" : "danger");
  const input = document.getElementById("lookup-q");
  if (input) input.value = state.lookupQ;
  updateLookupResults();
}
function activateScannerMode() {
  if (_scannerActive) return;
  _scannerActive = true;
  _scanBuffer = ""; _scanLastTime = 0;
  document.addEventListener("keydown", scannerKeydownHandler, true);
}
function deactivateScannerMode() {
  if (!_scannerActive) return;
  _scannerActive = false;
  document.removeEventListener("keydown", scannerKeydownHandler, true);
  _scanBuffer = ""; _scanLastTime = 0;
}
function syncScannerMode() {
  if (state.session && (state.view === "stock" || state.view === "lookup")) activateScannerMode();
  else deactivateScannerMode();
}

function parseBarcodeDigits(rawInput) {
  const digits = String(rawInput).replace(/\D/g, "");
  let sku, prefix = null, suffix = null;
  if (digits.length === 14) {
    prefix = digits.slice(0, 5);
    sku = digits.slice(5, 13);
    suffix = digits.slice(13, 14);
  } else if (digits.length === 8) {
    sku = digits;
  } else {
    return null;
  }
  return { sku, prefix, suffix, digits };
}
function handleBarcodeInput(rawInput, inputMethod) {
  const parsed = parseBarcodeDigits(rawInput);
  if (!parsed) {
    showToast(`Unrecognized code length (${String(rawInput).replace(/\D/g,"").length} digits) — expected 8 or 14`, "danger");
    return null;
  }
  const { sku, prefix, suffix, digits } = parsed;
  const payload = {
    sku, prefix, suffix,
    fullBarcodeFormatted: prefix ? `${prefix}-${sku}-${suffix}` : sku,
    rawInput: digits,
    inputMethod,
    action: state.stockType === "IN" ? "stock_in" : "stock_out",
  };
  applyBarcodePayload(payload);
  return payload;
}

function applyBarcodePayload(payload) {
  const item = state.inventory.find(i => i.sku === payload.sku);
  let idx = state.rows.findIndex(r => !r.sku);
  if (idx === -1) {
    if (state.bulk) { state.rows.push({ sku: "", description: "", qty: "", notes: "", locator: "" }); idx = state.rows.length - 1; }
    else idx = 0;
  }
  state.rows[idx] = { ...state.rows[idx], sku: payload.sku, description: item ? item.description : state.rows[idx].description,
    locator: state.rows[idx].locator || (item ? item.locator || "" : ""), _barcodeMeta: payload };
  showToast(
    item ? `${payload.inputMethod === "scanner" ? "Scanned" : "Entered"} ${payload.sku} — ${item.description}` : `SKU ${payload.sku} not found in inventory — row filled for review`,
    item ? "ok" : "danger"
  );
  render();
  requestAnimationFrame(() => {
    const qtyInput = document.querySelector(`.row-qty[data-idx="${idx}"]`);
    if (qtyInput) qtyInput.focus();
  });
}

async function submitStock() {
  const validRows = state.rows.filter(r => r.sku && r.qty);
  if (validRows.length === 0) return showToast("Add at least one SKU with quantity", "danger");
  if (validRows.some(r => !r.locator)) return showToast("Select a location for every row", "danger");

  const type = state.stockType;
  let newTx = [];
  let invUpdates = [];
  let locUpdates = [];
  let hadError = false;
  const seenLocs = new Map(); // sku -> Set of active locators, seeded lazily

  const activeLocsFor = (sku) => {
    if (!seenLocs.has(sku)) seenLocs.set(sku, new Set(getSkuLocations(sku).map(l => l.locator)));
    return seenLocs.get(sku);
  };
  const locQtyFor = (sku, locator) => {
    const existing = state.skuLocations.find(l => l.sku === sku && l.locator === locator);
    if (existing) return existing.qty;
    const item = state.inventory.find(i => i.sku === sku);
    // No explicit breakdown yet for this SKU — its whole qty is implicitly at its primary locator.
    if (item && item.locator === locator && getSkuLocations(sku).length === 0) return item.qty;
    return 0;
  };

  const seededSkus = new Set();
  const seedIfNeeded = (sku) => {
    if (seededSkus.has(sku)) return;
    seededSkus.add(sku);
    if (getSkuLocations(sku).length === 0) {
      const item = state.inventory.find(i => i.sku === sku);
      if (item && item.locator && item.qty > 0) {
        state.skuLocations.push({ sku, locator: item.locator, qty: item.qty });
        locUpdates.push({ sku, locator: item.locator, qty: item.qty });
      }
    }
  };

  validRows.forEach(r => {
    const item = state.inventory.find(i => i.sku === r.sku);
    if (!item) { hadError = true; return; }
    seedIfNeeded(r.sku);
    const qty = parseInt(r.qty, 10);
    if (!qty || qty <= 0) { hadError = true; return; }
    const locator = r.locator;

    if (type === "OUT") {
      const avail = locQtyFor(r.sku, locator);
      if (qty > avail) {
        showToast(`${r.sku}: not enough stock at ${locator} (${avail} available)`, "danger");
        hadError = true; return;
      }
    } else {
      const locs = activeLocsFor(r.sku);
      if (!locs.has(locator) && locs.size >= 5) {
        showToast(`${r.sku}: already has the maximum of 5 storage locations`, "danger");
        hadError = true; return;
      }
      locs.add(locator);
    }

    const wasUnlocated = !item.locator;
    const newQty = type === "IN" ? item.qty + qty : item.qty - qty;
    invUpdates.push({ sku: item.sku, qty: newQty, locator: wasUnlocated ? locator : undefined });
    item.qty = newQty;
    if (wasUnlocated) item.locator = locator;

    const curLocQty = locQtyFor(r.sku, locator);
    const newLocQty = type === "IN" ? curLocQty + qty : curLocQty - qty;
    locUpdates.push({ sku: r.sku, locator, qty: newLocQty });
    // Apply immediately so a second bulk row for the same SKU/location in this
    // same submission sees the correct running total, not a stale read.
    const li = state.skuLocations.findIndex(l => l.sku === r.sku && l.locator === locator);
    if (newLocQty > 0) {
      if (li > -1) state.skuLocations[li].qty = newLocQty;
      else state.skuLocations.push({ sku: r.sku, locator, qty: newLocQty });
    } else if (li > -1) {
      state.skuLocations.splice(li, 1);
    }

    const meta = r._barcodeMeta || {};
    newTx.push({
      id: "T-" + Math.floor(1000+Math.random()*9000) + (Date.now()%1000) + Math.floor(Math.random()*99),
      type, sku: r.sku, description: item.description, qty,
      locator, notes: r.notes || "—", user: state.session.name,
      value: qty * item.unitValue, timestamp: fmt(0),
      inputMethod: meta.inputMethod || "manual-form",
      prefix: meta.prefix ?? null,
      suffix: meta.suffix ?? null,
      fullBarcodeFormatted: meta.fullBarcodeFormatted ?? null,
      rawInput: meta.rawInput ?? null,
    });
  });

  if (newTx.length === 0) {
    if (!hadError) showToast("No valid SKUs found in inventory", "danger");
    return;
  }

  const dedupeByKey = (arr, keyFn) => [...new Map(arr.map(x => [keyFn(x), x])).values()];
  invUpdates = dedupeByKey(invUpdates, u => u.sku);
  locUpdates = dedupeByKey(locUpdates, u => `${u.sku}|${u.locator}`);

  const results = await Promise.all(invUpdates.map(u => {
    const payload = { qty: u.qty };
    if (u.locator) payload.locator = u.locator;
    return sb.from("inventory").update(payload).eq("sku", u.sku);
  }));
  const updateErr = results.find(r => r.error);
  if (updateErr) { showToast(updateErr.error.message, "danger"); return; }

  const locResults = await Promise.all(locUpdates.map(u =>
    u.qty > 0
      ? sb.from("sku_locations").upsert({ sku: u.sku, locator: u.locator, qty: u.qty }, { onConflict: "sku,locator" })
      : sb.from("sku_locations").delete().eq("sku", u.sku).eq("locator", u.locator)
  ));
  const locErr = locResults.find(r => r.error);
  if (locErr) { showToast(`Location update failed: ${locErr.error.message}`, "danger"); return; }

  const { error: txErr } = await sb.from("transactions").insert(newTx.map(t => ({
    id: t.id, type: t.type, sku: t.sku, description: t.description, qty: t.qty, locator: t.locator,
    notes: t.notes, user_name: t.user, user_id: state.session.id, value: t.value, timestamp: t.timestamp,
    input_method: t.inputMethod, prefix: t.prefix, suffix: t.suffix,
    full_barcode_formatted: t.fullBarcodeFormatted, raw_input: t.rawInput,
  })));
  if (txErr) { showToast(txErr.message, "danger"); return; }

  state.transactions.unshift(...newTx);
  state.rows = [{ sku: "", description: "", qty: "", notes: "", locator: "" }];
  state.barcodeManual = "";
  showToast(`${newTx.length} stock ${type==='IN'?'in':'out'} entr${newTx.length>1?'ies':'y'} recorded`, "ok");
  render();
}

async function submitAdjustment() {
  const sku = document.getElementById("adj-sku").value.trim();
  const reason = document.getElementById("adj-reason").value;
  const delta = parseInt(document.getElementById("adj-delta").value, 10);
  const notes = document.getElementById("adj-notes").value.trim();
  if (!sku) return showToast("SKU is required", "danger");
  const item = state.inventory.find(i => i.sku === sku);
  if (!item) return showToast(`SKU ${sku} not found in inventory`, "danger");
  if (!delta) return showToast("Enter a non-zero quantity change", "danger");
  if (!notes) return showToast("A note is required for the audit trail", "danger");

  const qtyBefore = item.qty;
  const qtyAfter = Math.max(0, qtyBefore + delta);

  const { error: invErr } = await sb.from("inventory").update({ qty: qtyAfter }).eq("sku", sku);
  if (invErr) { showToast(invErr.message, "danger"); return; }

  const adj = {
    id: "ADJ-" + Math.floor(1000+Math.random()*9000) + (Date.now()%1000),
    sku, description: item.description, reason, delta, qtyBefore, qtyAfter,
    notes, user: state.session.name, timestamp: fmt(0),
  };
  const { error: adjErr } = await sb.from("adjustments").insert({
    id: adj.id, sku: adj.sku, description: adj.description, reason: adj.reason, delta: adj.delta,
    qty_before: adj.qtyBefore, qty_after: adj.qtyAfter, notes: adj.notes,
    user_name: adj.user, user_id: state.session.id, timestamp: adj.timestamp,
  });
  if (adjErr) { showToast(adjErr.message, "danger"); return; }

  item.qty = qtyAfter;
  state.adjustments.unshift(adj);
  state._adjForm = { sku:"", reason: ADJUSTMENT_REASONS[0], delta:"", notes:"" };
  showToast(`Adjustment recorded — ${item.sku} now at ${qtyAfter}`, "ok");
  render();
}
