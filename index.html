      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Approval</th><th>Status</th><th>Last login</th><th style="text-align:right;">Actions</th></tr></thead>
          <tbody>
            ${state.users.map(u => `
              <tr>
                <td>${esc(u.name)}${u.id===state.session.id?' <span style="font-size:10px;color:var(--dim);">(you)</span>':''}</td>
                <td class="mono" style="font-size:11.5px;color:var(--muted);">${esc(u.username)}</td>
                <td>
                  <select data-action="change-role" data-id="${u.id}" style="width:auto;padding:5px 8px;font-size:11.5px;">
                    ${ROLES.map(r => `<option value="${r}" ${u.role===r?'selected':''}>${r}</option>`).join("")}
                  </select>
                </td>
                <td>${u.approved ? `<span class="tag tag-ok">${ICONS.check} Approved</span>` : `<span class="tag tag-accent">Pending</span>`}</td>
                <td>${u.status==='online' ? `<span class="tag tag-ok">${ICONS.wifi} Online</span>` : `<span class="tag">${ICONS.wifiOff} Offline</span>`}</td>
                <td style="font-size:11.5px;color:var(--muted);">${u.lastLogin}</td>
                <td style="text-align:right;white-space:nowrap;">
                  ${!u.approved ? `<button class="btn btn-primary btn-sm" style="margin-right:6px;" data-action="approve-user" data-id="${u.id}">Approve</button>` : ""}
                  <button class="icon-btn" data-action="remove-user" data-id="${u.id}">${ICONS.trash}</button>
                </td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

/* ---------------------------------------------------------
   TRANSACTION LOG
   "Stock movements" is virtualized (see mountTxVirtualList) so
   it stays fast no matter how many entries accumulate.
--------------------------------------------------------- */
const TX_COLS = "90px 70px 130px 70px 120px 110px 130px 1fr 150px";

function renderTransactions() {
  const tab = state.txTab;
  return `
    <div style="margin-bottom:20px;">
      <h1 class="page-title">Transaction log</h1>
      <p class="page-sub">Full audit trail of stock movement, manual adjustments, and account activity, across every user.</p>
    </div>
    <div class="stockin-tabs" style="margin-bottom:16px;">
      <button class="stockin-tab ${tab==='stock'?'active-in':''}" data-action="set-tx-tab" data-tab="stock">Stock movements</button>
      <button class="stockin-tab ${tab==='adjustments'?'active-in':''}" data-action="set-tx-tab" data-tab="adjustments">Adjustments</button>
      <button class="stockin-tab ${tab==='access'?'active-in':''}" data-action="set-tx-tab" data-tab="access">Sign-in / sign-out</button>
    </div>
    ${tab === "stock" ? `
      <div class="vtable">
        <div class="vtable-hscroll">
          <div style="min-width:1180px;">
            <div class="vtable-head" style="grid-template-columns:${TX_COLS};">
              <div>Ref</div><div>Type</div><div>SKU</div><div>Qty</div><div>Locator</div><div>Value</div><div>By</div><div>Notes</div><div>Timestamp</div>
            </div>
            <div class="vtable-viewport" id="tx-viewport" style="height:460px;">
              <div class="vtable-spacer"><div class="vtable-rows"></div></div>
            </div>
          </div>
        </div>
      </div>
      <div class="pager"><span>${state.transactions.length} entries</span></div>
    ` : tab === "adjustments" ? `
      <div class="card" style="padding:0;overflow:hidden;">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Ref</th><th>SKU</th><th>Reason</th><th>Qty Δ</th><th>Before → After</th><th>By</th><th>Notes</th><th>Timestamp</th></tr></thead>
            <tbody>
              ${state.adjustments.length === 0 ? `<tr><td colspan="8" style="text-align:center;color:var(--dim);padding:24px;">No adjustments logged yet.</td></tr>` :
                state.adjustments.map(a => `
                <tr>
                  <td class="mono" style="font-size:11px;color:var(--dim);">${a.id}</td>
                  <td class="mono" style="font-size:12px;">${esc(a.sku)}</td>
                  <td><span class="tag tag-violet">${esc(a.reason)}</span></td>
                  <td class="mono" style="color:${a.delta<0?'var(--danger)':'var(--ok)'};">${a.delta>0?'+':''}${a.delta}</td>
                  <td class="mono" style="font-size:12px;">${a.qtyBefore} → ${a.qtyAfter}</td>
                  <td style="color:var(--nav-text);">${esc(a.user)}</td>
                  <td style="color:var(--muted);font-size:12px;">${esc(a.notes)}</td>
                  <td style="color:var(--dim);font-size:11px;">${a.timestamp}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>
      </div>
    ` : `
      <div class="card" style="padding:0;overflow:hidden;">
        <div class="table-wrap">
          <table>
            <thead><tr><th>User</th><th>Role</th><th>Action</th><th>Timestamp</th></tr></thead>
            <tbody>
              ${state.loginLogs.length === 0 ? `<tr><td colspan="4" style="text-align:center;color:var(--dim);padding:24px;">No activity yet.</td></tr>` :
              state.loginLogs.map(l => `
                <tr>
                  <td>${esc(l.user)}</td>
                  <td style="color:var(--muted);">${esc(l.role)}</td>
                  <td>${(l.action.includes("in")||l.action.includes("created")) ?
                    `<span style="display:inline-flex;align-items:center;gap:5px;color:var(--ok);font-size:12px;">${ICONS.check} ${esc(l.action)}</span>` :
                    `<span style="display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:12px;">${ICONS.logout} ${esc(l.action)}</span>`}</td>
                  <td style="font-size:11px;color:var(--dim);">${l.timestamp}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>
      </div>`}
  `;
}
function renderTxRow(t) {
  const typeTag = t.type==='IN' ? `<span class="tag tag-ok">IN</span>` : t.type==='OUT' ? `<span class="tag tag-accent">OUT</span>` : `<span class="tag tag-violet">${esc(t.type||'ADJ')}</span>`;
  return `<div class="vrow" style="grid-template-columns:${TX_COLS};">
    <div class="mono" style="font-size:11px;color:var(--dim);">${esc(t.id)}</div>
    <div>${typeTag}</div>
    <div class="mono" style="font-size:12px;">${esc(t.sku)}</div>
    <div>${t.qty}</div>
    <div><span class="tag">${esc(t.locator)}</span></div>
    <div class="mono" style="font-size:12px;">₱${(t.value||0).toLocaleString()}</div>
    <div style="color:var(--nav-text);">${esc(t.user)}</div>
    <div style="color:var(--muted);font-size:12px;">${esc(t.notes)}${t.inputMethod==='scanner'?' <span style="color:var(--ok);">(scanned)</span>':''}</div>
    <div style="color:var(--dim);font-size:11px;">${t.timestamp}</div>
  </div>`;
}
function mountTxVirtualList() {
  mountVirtualList("tx-viewport", state.transactions, 42, (t) => renderTxRow(t), "No stock movements yet.");
}

/* ---------------------------------------------------------
   PROFILE
--------------------------------------------------------- */
function renderProfile() {
  const s = state.session;
  return `
    <div style="max-width:480px;">
      <div style="margin-bottom:20px;">
        <h1 class="page-title">Your profile</h1>
        <p class="page-sub">Update your account details.</p>
      </div>
      <div class="card">
        <div style="display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--line);margin-bottom:16px;">
          <div class="avatar" style="background:${roleColor(s.role)}22;color:${roleColor(s.role)};">${initials(s.name)}</div>
          <div>
            <div style="font-size:13.5px;font-weight:500;">${esc(s.name)}</div>
            <div style="font-size:12px;color:var(--muted);">${esc(s.role)}</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:14px;">
          <label class="field"><span class="lbl">Full name</span><input id="pf-name" value="${esc(s.name)}" /></label>
          <label class="field"><span class="lbl">Username</span><input id="pf-username" value="${esc(s.username)}" /></label>
          <label class="field"><span class="lbl">Email (login)</span><input id="pf-email" value="${esc(s.email)}" disabled /></label>
          <p style="font-size:11px;color:var(--dim);margin:-6px 0 0;">Your login email is managed through Supabase Auth and isn't editable here.</p>
          <div style="display:flex;justify-content:flex-end;padding-top:6px;">
            <button class="btn btn-primary" data-action="save-profile">Save changes</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ---------------------------------------------------------
   EVENT HANDLING
--------------------------------------------------------- */
function attachHandlers() {
  const app = document.getElementById("app");

  app.onclick = async (e) => {
    const el = e.target.closest("[data-action]");
    if (!el) return;
    // ignore backdrop click if the actual click landed on the modal box
    if ((el.dataset.action === "close-edit-item" || el.dataset.action === "confirm-no") && e.target.closest(".modal")) return;
    const action = el.dataset.action;

    if (action === "toggle-theme") {
      state.theme = state.theme === "light" ? "dark" : "light";
      localStorage.setItem("depotos-theme", state.theme);
      applyTheme();
      render();
    }
    else if (action === "set-auth-mode") { state.authMode = el.dataset.mode; render(); }
    else if (action === "set-signup-role") { state._signupRole = el.dataset.role; render(); }
    else if (action === "do-login") {
      const uname = document.getElementById("login-username").value.trim();
      const pwd = document.getElementById("login-password").value;
      if (!uname || !pwd) { showToast("Enter your username/email and password", "danger"); return; }
      doLogin(uname, pwd);
    }
    else if (action === "do-signup") {
      const payload = {
        name: document.getElementById("su-name").value.trim(),
        username: document.getElementById("su-username").value.trim(),
        email: document.getElementById("su-email").value.trim(),
        password: document.getElementById("su-password").value,
        role: state._signupRole || "Stock Clerk",
      };
      if (payload.name && payload.username && payload.email && payload.password) doSignup(payload);
      else showToast("Please complete all fields", "danger");
    }
    else if (action === "do-logout") doLogout();
    else if (action === "set-view") { state.view = el.dataset.view; render(); }
    else if (action === "set-stock-type") { state.stockType = el.dataset.type; render(); }
    else if (action === "add-row") { state.rows.push({ sku:"", description:"", qty:"", notes:"", locator:"" }); render(); }
    else if (action === "remove-row") {
      const idx = +el.dataset.idx;
      state.rows.splice(idx, 1);
      if (state.rows.length === 0) state.rows.push({ sku:"", description:"", qty:"", notes:"", locator:"" });
      render();
    }
    else if (action === "submit-stock") await submitStock();
    else if (action === "submit-manual-barcode") {
      const inputEl = document.getElementById("barcode-manual-input");
      const val = inputEl ? inputEl.value.trim() : "";
      if (!val) { showToast("Enter a barcode or SKU first", "danger"); return; }
      const payload = handleBarcodeInput(val, "manual");
      if (payload) state.barcodeManual = "";
    }
    else if (action === "submit-adjustment") await submitAdjustment();
    else if (action === "add-locator") {
      const f = state._locForm || {};
      if (!f.code) { showToast("Locator code is required", "danger"); return; }
      const { error } = await sb.from("locators").insert({ code: f.code, zone: f.zone||"", description: f.description||"" });
      if (error) { showToast(error.code === "23505" ? "Locator code already exists" : error.message, "danger"); return; }
      state.locators.push({ code: f.code, zone: f.zone||"", description: f.description||"" });
      state._locForm = { code:"", zone:"", description:"" };
      showToast("Locator added", "ok");
      render();
    }
    else if (action === "remove-locator") {
      askConfirm("Remove locator?", `This deletes locator ${el.dataset.code}. Items already assigned to it will keep the code as a label.`, "delete-locator", el.dataset.code, "Remove");
    }
    else if (action === "add-category") {
      const input = document.getElementById("cat-new");
      const val = input.value.trim();
      if (!val) { showToast("Enter a category name", "danger"); return; }
      const { error } = await sb.from("categories").insert({ name: val });
      if (error) { showToast(error.code === "23505" ? "That category already exists" : error.message, "danger"); return; }
      state.categories.push(val);
      showToast("Category added", "ok");
      render();
    }
    else if (action === "remove-category") {
      askConfirm("Remove category?", `SKUs currently under "${el.dataset.cat}" will keep the label until reassigned.`, "delete-category", el.dataset.cat, "Remove");
    }
    else if (action === "approve-user") {
      const { error } = await sb.from("profiles").update({ approved: true }).eq("id", el.dataset.id);
      if (error) { showToast(error.message, "danger"); return; }
      const u = state.users.find(u => u.id === el.dataset.id);
      if (u) u.approved = true;
      showToast("User approved — they can now sign in.", "ok");
      render();
    }
    else if (action === "remove-user") {
      if (el.dataset.id === state.session.id) { showToast("You can't delete your own account while signed in", "danger"); return; }
      askConfirm("Remove user?", "This removes their profile and access immediately. (Their login can only be fully deleted from the Supabase dashboard, since that requires admin-level API access.)", "delete-user", el.dataset.id, "Remove");
    }
    else if (action === "save-profile") {
      const name = document.getElementById("pf-name").value.trim();
      const username = document.getElementById("pf-username").value.trim();
      const { error } = await sb.from("profiles").update({ name, username }).eq("id", state.session.id);
      if (error) { showToast(error.code === "23505" ? "That username is taken" : error.message, "danger"); return; }
      state.session.name = name; state.session.username = username;
      const u = state.users.find(u => u.id === state.session.id);
      if (u) Object.assign(u, { name, username });
      showToast("Profile updated", "ok");
      render();
    }
    else if (action === "set-tx-tab") { state.txTab = el.dataset.tab; render(); }
    else if (action === "toggle-team-panel") {
      state.teamPanelOpen = !state.teamPanelOpen;
      if (state.teamPanelOpen && !state._notifiedRetention) {
        state._notifiedRetention = true;
        showToast("Heads up: direct messages auto-delete after 3 months.", "ok");
      }
      render();
    }
    else if (action === "close-team-panel") { state.teamPanelOpen = false; state.chatWith = null; render(); }
    else if (action === "open-chat") { state.chatWith = el.dataset.id; markThreadRead(el.dataset.id); render(); }
    else if (action === "back-to-team-list") { state.chatWith = null; render(); }
    else if (action === "send-message") {
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text) return;
      const msg = { id: "m"+Date.now(), from_id: state.session.id, to_id: state.chatWith, text, timestamp: fmt(0), read: false };
      const { error } = await sb.from("messages").insert(msg);
      if (error) { showToast(error.message, "danger"); return; }
      state.messages.push({ id: msg.id, from: msg.from_id, to: msg.to_id, text: msg.text, timestamp: msg.timestamp, read: true });
      render();
    }
    else if (action === "trigger-import") document.getElementById("import-file").click();
    else if (action === "export-csv") exportCSV();
    else if (action === "export-pdf") exportPDF();
    else if (action === "open-add-item") openEditItem(null);
    else if (action === "edit-item") openEditItem(el.dataset.sku);
    else if (action === "delete-item") askConfirm("Delete this SKU?", `${el.dataset.sku} will be permanently removed from inventory.`, "delete-item", el.dataset.sku, "Delete");
    else if (action === "reset-qty") askConfirm("Reset all quantities?", "Every SKU's on-hand quantity will be set to 0. Each change is logged to the audit trail as a Physical Count Correction.", "reset-qty", null, "Reset all");
    else if (action === "close-edit-item") { state.editItem = null; render(); }
    else if (action === "save-edit-item") await saveEditItem();
    else if (action === "confirm-yes") await runConfirmedAction();
    else if (action === "confirm-no") { state.confirm = null; render(); }
  };

  app.onchange = async (e) => {
    if (e.target.id === "bulk-toggle") { state.bulk = e.target.checked; render(); }
    else if (e.target.id === "lookup-loc") { state.lookupLoc = e.target.value; updateLookupResults(); }
    else if (e.target.id === "lookup-cat") { state.lookupCat = e.target.value; updateLookupResults(); }
    else if (e.target.id === "adj-reason") { state._adjForm = state._adjForm || { sku:"", reason: ADJUSTMENT_REASONS[0], delta:"", notes:"" }; state._adjForm.reason = e.target.value; }
    else if (e.target.id === "import-file") {
      if (e.target.files && e.target.files[0]) await importCSVFile(e.target.files[0]);
      e.target.value = "";
    }
    else if (e.target.classList.contains("row-locator")) {
      const idx = +e.target.dataset.idx;
      state.rows[idx].locator = e.target.value;
    }
    else if (e.target.dataset.action === "change-role") {
      const uid = e.target.dataset.id;
      const role = e.target.value;
      const { error } = await sb.from("profiles").update({ role }).eq("id", uid);
      if (error) { showToast(error.message, "danger"); return; }
      const u = state.users.find(u => u.id === uid);
      if (u) u.role = role;
      showToast("Access level updated", "ok");
    }
  };

  app.oninput = (e) => {
    if (e.target.id === "lookup-q") {
      state.lookupQ = e.target.value;
      clearTimeout(_lookupDebounce);
      _lookupDebounce = setTimeout(updateLookupResults, 150);
    }
    else if (e.target.id === "barcode-manual-input") {
      state.barcodeManual = e.target.value;
      clearTimeout(_manualBarcodeDebounce);
      const digitLen = e.target.value.replace(/\D/g, "").length;
      if (digitLen === 8 || digitLen === 14) {
        // Scanner finished (or a human finished typing) a complete code.
        // Wait briefly in case more characters are still arriving — real
        // scanner bursts finish in well under this window, so a genuine
        // pause here means the code is done, even with no Enter sent.
        _manualBarcodeDebounce = setTimeout(() => {
          const el = document.getElementById("barcode-manual-input");
          if (el && el.value.replace(/\D/g, "").length === digitLen) {
            document.querySelector('[data-action="submit-manual-barcode"]')?.click();
          }
        }, 120);
      }
    }
    else if (e.target.id === "loc-code" || e.target.id === "loc-zone" || e.target.id === "loc-desc") {
      state._locForm = state._locForm || { code:"", zone:"", description:"" };
      if (e.target.id === "loc-code") state._locForm.code = e.target.value;
      if (e.target.id === "loc-zone") state._locForm.zone = e.target.value;
      if (e.target.id === "loc-desc") state._locForm.description = e.target.value;
    }
    else if (e.target.id === "adj-sku" || e.target.id === "adj-delta" || e.target.id === "adj-notes") {
      state._adjForm = state._adjForm || { sku:"", reason: ADJUSTMENT_REASONS[0], delta:"", notes:"" };
      if (e.target.id === "adj-sku") state._adjForm.sku = e.target.value;
      if (e.target.id === "adj-delta") state._adjForm.delta = e.target.value;
      if (e.target.id === "adj-notes") state._adjForm.notes = e.target.value;
    }
    else if (e.target.classList.contains("row-sku") || e.target.classList.contains("row-desc") || e.target.classList.contains("row-qty") || e.target.classList.contains("row-notes")) {
      const idx = +e.target.dataset.idx;
      const field = e.target.dataset.field;
      state.rows[idx][field] = e.target.value;
      if (field === "sku") {
        const item = state.inventory.find(i => i.sku === e.target.value);
        if (item) {
          state.rows[idx].description = item.description;
          if (!state.rows[idx].locator) state.rows[idx].locator = item.locator || "";
          render(); refocus(`.row-sku[data-idx="${idx}"]`, true);
        }
      }
    }
  };

  app.onkeydown = (e) => {
    if (e.key === "Enter" && e.target.id === "chat-input") {
      e.preventDefault();
      document.querySelector('[data-action="send-message"]')?.click();
    }
    if (e.key === "Enter" && e.target.id === "barcode-manual-input") {
      e.preventDefault();
      document.querySelector('[data-action="submit-manual-barcode"]')?.click();
    }
  };
}

function refocus(idOrSelector, isSelector) {
  requestAnimationFrame(() => {
    const el = isSelector ? document.querySelector(idOrSelector) : document.getElementById(idOrSelector);
    if (el) { el.focus(); const v = el.value; el.value=""; el.value=v; }
  });
}

boot();
</script>
