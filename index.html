<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DEPOT/OS — Warehouse Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#14171D; --panel:#1E222B; --panel-2:#181C24; --field:#161A21;
    --line:#2A2F3A; --line-2:#20242E; --text:#E8EAED; --muted:#8A93A3; --dim:#5A6272;
    --accent:#FF8A3D; --accent-dk:#3A2617; --accent-bd:#4A331F;
    --ok:#4DD9C7; --ok-dk:#12312C; --ok-bd:#1E4A42;
    --danger:#FF6B6F; --danger-dk:#2A1416; --danger-bd:#5C2226;
    --violet:#9E8CFF; --violet-dk:#251F3D; --violet-bd:#3C3466;
    --sidebar-w:64px; --sidebar-w-open:236px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#2A2F3A;border-radius:4px;}
  input,select,button,textarea{font-family:inherit;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
  input,select,textarea{
    background:var(--field); border:1px solid var(--line); border-radius:3px;
    padding:9px 12px; font-size:13.5px; color:var(--text); outline:none; width:100%; min-width:0;
  }
  input::placeholder,textarea::placeholder{color:#5A6272;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent);}
  input:disabled{opacity:.55;cursor:not-allowed;}
  label.field{display:flex;flex-direction:column;gap:5px;font-size:13px;min-width:0;}
  label.field .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
  button{cursor:pointer;border:none;font-size:13.5px;}
  .btn{
    font-size:13.5px;font-weight:500;padding:9px 15px;border-radius:3px;
    display:inline-flex;align-items:center;gap:7px;justify-content:center;transition:.15s;white-space:nowrap;
  }
  .btn-primary{background:var(--accent);color:#1C1017;}
  .btn-primary:hover{background:#FF9D5C;}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid #3A4150;}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger-bd);}
  .btn-danger:hover{background:var(--danger-dk);}
  .btn-sm{padding:6px 11px;font-size:12.5px;}
  .icon-btn{background:none;color:var(--dim);padding:5px;display:inline-flex;border-radius:3px;}
  .icon-btn:hover{color:var(--danger);background:var(--danger-dk);}
  .icon-btn.edit:hover{color:var(--accent);background:var(--accent-dk);}
  .icon-btn.msg:hover{color:var(--ok);background:var(--ok-dk);}

  .tag{
    position:relative;display:inline-flex;align-items:center;gap:5px;
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.02em;
    padding:4px 9px 4px 12px;border:1px solid var(--line);border-radius:2px;
    background:#2A2F3A;color:var(--text);white-space:nowrap;
  }
  .tag::before{content:"";position:absolute;left:-3px;top:50%;transform:translateY(-50%);
    width:5px;height:5px;border-radius:50%;background:#0F1115;border:1px solid currentColor;}
  .tag-accent{background:var(--accent-dk);color:var(--accent);border-color:var(--accent-bd);}
  .tag-ok{background:var(--ok-dk);color:var(--ok);border-color:var(--ok-bd);}
  .tag-danger{background:var(--danger-dk);color:var(--danger);border-color:var(--danger-bd);}
  .tag-violet{background:var(--violet-dk);color:var(--violet);border-color:var(--violet-bd);}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:5px 10px;border-radius:20px;
    background:var(--field);border:1px solid var(--line);color:var(--muted);}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:16px;min-width:0;}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px;}
  thead tr{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    background:var(--panel-2);border-bottom:1px solid var(--line);}
  th{padding:9px 14px;white-space:nowrap;}
  td{padding:9px 14px;border-bottom:1px solid var(--line-2);}
  tr:last-child td{border-bottom:none;}
  .pager{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:12px;font-size:12px;color:var(--muted);flex-wrap:wrap;}

  /* ---- layout ---- */
  #app{min-height:100vh;width:100%;}
  .shell{display:flex;min-height:100vh;}
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:100;
    background:var(--panel-2);border-right:1px solid var(--line);
    display:flex;flex-direction:column;overflow:hidden;transition:width .18s ease;
  }
  .sidebar:hover,.sidebar:focus-within{width:var(--sidebar-w-open);box-shadow:6px 0 28px rgba(0,0,0,.4);}
  .hide-collapsed{opacity:0;max-width:0;overflow:hidden;white-space:nowrap;transition:opacity .12s ease,max-width .18s ease;}
  .sidebar:hover .hide-collapsed,.sidebar:focus-within .hide-collapsed{opacity:1;max-width:180px;}
  .brand{padding:18px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .brand-mark{width:32px;height:32px;flex-shrink:0;border-radius:3px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#1C1017;}
  .brand-name{font-size:13.5px;font-weight:600;letter-spacing:-.01em;}
  .brand-sub{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;}
  .nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:3px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:3px;font-size:13.5px;
    color:#B4BAC5;border:1px solid transparent;text-align:left;background:none;width:100%;}
  .nav-item:hover{background:#1F2430;}
  .nav-item.active{background:var(--accent-dk);color:var(--accent);border-color:var(--accent-bd);}
  .nav-item svg{flex-shrink:0;}
  .sidebar-foot{padding:14px 12px;border-top:1px solid var(--line);}
  .who{display:flex;align-items:center;gap:8px;padding:0 8px;margin-bottom:12px;}
  .dot{width:8px;height:8px;flex-shrink:0;border-radius:50%;background:var(--ok);}
  .who-name{font-size:12.5px;font-weight:500;}
  .who-role{font-size:11px;color:var(--muted);}

  .main{flex:1;min-width:0;margin-left:var(--sidebar-w);display:flex;flex-direction:column;min-height:100vh;}
  .topbar{min-height:56px;border-bottom:1px solid var(--line);display:flex;align-items:center;
    justify-content:space-between;padding:10px 24px;flex-shrink:0;gap:12px;flex-wrap:wrap;}
  .content{flex:1;overflow-y:auto;padding:24px;}
  h1.page-title{font-size:17px;font-weight:600;letter-spacing:-.01em;margin:0 0 4px;}
  p.page-sub{font-size:13.5px;color:var(--muted);margin:0;}
  .stripe{position:fixed;top:0;left:0;width:100%;height:6px;z-index:300;
    background:repeating-linear-gradient(45deg,#FF8A3D 0,#FF8A3D 10px,#1C1017 10px,#1C1017 20px);}

  .grid{display:grid;gap:14px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-2{grid-template-columns:repeat(2,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  @media(max-width:900px){
    .grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:1fr;}
    .dash-row{grid-template-columns:1fr !important;}
  }
  @media(max-width:520px){.grid-4{grid-template-columns:1fr;}}

  .stat-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);}
  .stat-value{font-size:24px;font-weight:600;font-family:'IBM Plex Mono',monospace;margin-top:8px;word-break:break-word;}
  .stat-sub{font-size:11px;color:var(--muted);margin-top:6px;}

  .toast{margin-bottom:16px;padding:10px 16px;border-radius:3px;font-size:13.5px;border:1px solid;}
  .toast-ok{background:var(--ok-dk);border-color:var(--ok-bd);color:var(--ok);}
  .toast-danger{background:var(--danger-dk);border-color:var(--danger-bd);color:var(--danger);}

  .chart-wrap{height:230px;display:flex;align-items:flex-end;gap:14px;padding-top:10px;min-width:280px;}
  .chart-day{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px;}
  .bars{display:flex;align-items:flex-end;gap:4px;height:100%;width:100%;justify-content:center;}
  .bar{width:16px;border-radius:2px 2px 0 0;transition:height .3s;}
  .bar-in{background:var(--ok);}
  .bar-out{background:var(--accent);}
  .chart-daylabel{font-size:11px;color:var(--dim);}

  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .auth-box{width:100%;max-width:420px;}
  .auth-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:26px;}
  .tabs{display:flex;gap:4px;background:var(--field);border-radius:3px;padding:4px;margin-bottom:22px;}
  .tab-btn{flex:1;padding:9px;font-size:13.5px;border-radius:3px;background:none;color:var(--muted);}
  .tab-btn.active{background:var(--accent);color:#1C1017;font-weight:600;}
  .role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .role-opt{padding:9px 6px;font-size:11.5px;border-radius:3px;border:1px solid var(--line);background:none;color:var(--muted);}
  .role-opt.active{border-color:var(--accent);background:var(--accent-dk);color:var(--accent);}

  .stockin-tabs{display:flex;background:var(--field);border:1px solid var(--line);border-radius:3px;padding:4px;width:fit-content;}
  .stockin-tab{padding:9px 15px;font-size:13.5px;border-radius:3px;background:none;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .stockin-tab.active-in{background:var(--ok-dk);color:var(--ok);}
  .stockin-tab.active-out{background:var(--accent-dk);color:var(--accent);}

  .row-grid{display:grid;grid-template-columns:2fr 3fr 1fr 2fr 28px;gap:10px;align-items:center;margin-bottom:8px;}
  .row-grid.single{grid-template-columns:2fr 3fr 1fr 3fr;}
  .row-head{display:grid;grid-template-columns:2fr 3fr 1fr 2fr 28px;gap:10px;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;padding:0 2px;}
  .row-head.single{grid-template-columns:2fr 3fr 1fr 3fr;}
  @media(max-width:700px){
    .row-grid,.row-grid.single,.row-head,.row-head.single{grid-template-columns:1fr;}
    .row-head{display:none;}
  }

  .user-chip{display:flex;align-items:center;gap:8px;background:var(--field);border:1px solid var(--line);border-radius:3px;padding:8px 12px;font-size:12.5px;}
  .role-pill{font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid;white-space:nowrap;}

  .checkbox-row{display:flex;align-items:center;gap:8px;font-size:13.5px;color:#B4BAC5;cursor:pointer;user-select:none;}
  .checkbox-row input{width:auto;accent-color:var(--accent);}

  .avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;flex-shrink:0;}
  .avatar-sm{width:32px;height:32px;font-size:12px;}
  hr.sep{border:none;border-top:1px solid var(--line);margin:16px 0;}

  /* team / online button + slideover */
  .team-btn{display:flex;align-items:center;gap:8px;background:var(--field);border:1px solid var(--line);border-radius:20px;padding:6px 14px 6px 6px;}
  .team-btn:hover{border-color:var(--ok-bd);}
  .stack-avatars{display:flex;}
  .stack-avatars .avatar-sm{margin-left:-8px;border:2px solid var(--panel-2);}
  .stack-avatars .avatar-sm:first-child{margin-left:0;}

  .backdrop{position:fixed;inset:0;background:rgba(6,8,11,.55);z-index:190;opacity:0;pointer-events:none;transition:opacity .18s;}
  .backdrop.open{opacity:1;pointer-events:auto;}
  .panel{position:fixed;top:0;right:0;bottom:0;width:360px;max-width:92vw;background:var(--panel-2);
    border-left:1px solid var(--line);z-index:200;transform:translateX(100%);transition:transform .2s ease;
    display:flex;flex-direction:column;}
  .panel.open{transform:translateX(0);}
  .panel-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .panel-body{flex:1;overflow-y:auto;padding:14px;}
  .panel-note{padding:10px 14px;font-size:11px;color:var(--muted);border-top:1px solid var(--line);background:var(--panel);flex-shrink:0;}
  .team-row{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:5px;}
  .team-row:hover{background:var(--field);}
  .msg-thread{display:flex;flex-direction:column;gap:10px;padding:4px 2px;}
  .msg-bubble{max-width:80%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.4;}
  .msg-me{align-self:flex-end;background:var(--accent-dk);color:var(--text);border:1px solid var(--accent-bd);border-bottom-right-radius:2px;}
  .msg-them{align-self:flex-start;background:var(--field);border:1px solid var(--line);border-bottom-left-radius:2px;}
  .msg-time{font-size:10px;color:var(--dim);margin-top:3px;}
  .chat-input-row{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line);flex-shrink:0;}

  /* modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(6,8,11,.6);z-index:250;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:22px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 4px;font-size:15px;font-weight:600;}
  .modal p.hint{margin:0 0 18px;font-size:12.5px;color:var(--muted);}

  .banner{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:4px;border:1px solid var(--violet-bd);
    background:var(--violet-dk);color:#C9BFFF;font-size:12.5px;margin-bottom:16px;line-height:1.5;}

  ::selection{background:var(--accent);color:#1C1017;}
</style>
</head>

function fmt(daysAgo = 0, h, m) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  if (h !== undefined) d.setHours(h, m ?? 0, 0, 0);
  return d.toISOString().slice(0, 16).replace("T", " ");
}
function dayKeyOf(str){ return str.slice(0,10); }
function daysBetween(tsStr){
  const then = new Date(tsStr.replace(" ","T"));
  return (Date.now() - then.getTime()) / (1000*60*60*24);
}

function purgeOldMessages() {

  return before - state.messages.length;
}

/* ---------------------------------------------------------
   AUTH ACTIONS
--------------------------------------------------------- */
function doLogin(username) {
  const u = state.users.find(x => x.username.toLowerCase() === username.toLowerCase());
  if (!u) return showToast("No account with that username", "danger");
  u.status = "online"; u.lastLogin = fmt(0);
  state.loginLogs.unshift({ user: u.name, role: u.role, action: "Signed in", timestamp: fmt(0) });
  state.session = { ...u };
  state.view = "dashboard";
  render();
}
function doSignup(payload) {
  if (state.users.some(u => u.username.toLowerCase() === payload.username.toLowerCase())) {
    return showToast("Username already taken", "danger");
  }
  const newUser = {
    id: "u" + (state.users.length + 1) + Math.floor(Math.random()*999),
    name: payload.name, username: payload.username, email: payload.email,
    role: payload.role, status: "online", lastLogin: fmt(0),
  };
  state.users.push(newUser);
  state.loginLogs.unshift({ user: newUser.name, role: newUser.role, action: "Account created & signed in", timestamp: fmt(0) });
  state.session = { ...newUser };
  state.view = "dashboard";
  render();
}
function doLogout() {
  const u = state.users.find(x => x.id === state.session.id);
  if (u) u.status = "offline";
  state.loginLogs.unshift({ user: state.session.name, role: state.session.role, action: "Signed out", timestamp: fmt(0) });
  state.session = null;
  state.authMode = "login";
  state.teamPanelOpen = false;
  state.chatWith = null;
  render();
}

--------------------------------------------------------- */
function computeCategoryStats() {
  return state.categories.map(cat => {
    const items = state.inventory.filter(i => i.category === cat);
    const qty = items.reduce((s,i)=>s+i.qty,0);
    const value = items.reduce((s,i)=>s+i.qty*i.unitValue,0);
    return { category: cat, skuCount: items.length, qty, value };
  });
}

function renderDashboard() {
  const now = new Date();
  const isThisMonth = (t) => {
    const d = new Date(t.timestamp.replace(" ", "T"));
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  };
  const mtdIn = state.transactions.filter(t => t.type === "IN" && isThisMonth(t));
  const mtdOut = state.transactions.filter(t => t.type === "OUT" && isThisMonth(t));
  const mtdInValue = mtdIn.reduce((s,t)=>s+t.value,0);
  const mtdOutValue = mtdOut.reduce((s,t)=>s+t.value,0);
  const lowStock = state.inventory.filter(i => i.qty <= i.reorder);
  const totalValue = state.inventory.reduce((s,i)=>s+i.qty*i.unitValue,0);

  const days = [...Array(7)].map((_, idx) => {
    const d = new Date(); d.setDate(d.getDate() - (6-idx));
    const label = d.toLocaleDateString(undefined, { weekday: "short" });
    const key = d.toISOString().slice(0,10);
    const inCount = state.transactions.filter(t => t.type==="IN" && dayKeyOf(t.timestamp)===key).length;
    const outCount = state.transactions.filter(t => t.type==="OUT" && dayKeyOf(t.timestamp)===key).length;
    return { label, inCount, outCount };
  });
  const maxCount = Math.max(1, ...days.map(d => Math.max(d.inCount, d.outCount)));

  const perLocator = state.locators.map(loc => {
    const items = state.inventory.filter(i => i.locator === loc.code);
    const value = items.reduce((s,i)=>s+i.qty*i.unitValue,0);
    return { ...loc, skuCount: items.length, value };
  });

  const perCategory = computeCategoryStats();
  const maxCatValue = Math.max(1, ...perCategory.map(c => c.value));

  return `
    <div style="margin-bottom:20px;">
      <h1 class="page-title">Dashboard</h1>
      <p class="page-sub">Live snapshot of stock movement, value, category mix and location coverage.</p>
    </div>

      ${statCard(ICONS.down, "Stock In (MTD)", mtdIn.length, `₱${mtdInValue.toLocaleString()} received`, "ok")}
      ${statCard(ICONS.up, "Stock Out (MTD)", mtdOut.length, `₱${mtdOutValue.toLocaleString()} released`, "accent")}
      ${statCard(ICONS.alert, "Low-stock SKUs", lowStock.length, "At or below reorder level", "danger")}
      ${statCard(ICONS.layers, "Total inventory value", `₱${totalValue.toLocaleString()}`, `${state.inventory.length} SKUs · ${state.categories.length} categories`, "")}
    </div>

    <div class="grid dash-row" style="grid-template-columns:2fr 1fr;margin-bottom:16px;">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:8px;">
          <h2 style="font-size:13.5px;font-weight:600;margin:0;">In / Out frequency — last 7 days</h2>
          <div style="display:flex;gap:12px;font-size:11px;color:var(--muted);">
            <span style="display:flex;align-items:center;gap:5px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--ok);"></span>In</span>
            <span style="display:flex;align-items:center;gap:5px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent);"></span>Out</span>
          </div>
        </div>
        <div class="chart-wrap">
          ${days.map(d => `
            <div class="chart-day">
              <div class="bars">
                <div class="bar bar-in" style="height:${(d.inCount/maxCount*170)||2}px;" title="In: ${d.inCount}"></div>
                <div class="bar bar-out" style="height:${(d.outCount/maxCount*170)||2}px;" title="Out: ${d.outCount}"></div>
              </div>
              <div class="chart-daylabel">${d.label}</div>
            </div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <h2 style="font-size:13.5px;font-weight:600;margin:0;">Low-stock SKUs</h2>
          <span style="color:var(--danger);">${ICONS.alert}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;max-height:230px;overflow-y:auto;">
          ${lowStock.length === 0 ? `<p style="font-size:12px;color:var(--muted);">No SKUs below reorder level.</p>` :
            lowStock.map(i => `
              <div style="display:flex;align-items:center;justify-content:space-between;background:var(--field);border:1px solid var(--line);border-radius:3px;padding:8px 10px;gap:8px;">

          ${perCategory.map(c => `

function statCard(icon, label, value, sub, tone) {

/* CSV / PDF helpers */
function toCSV(items) {
  const header = ["SKU","Description","Category","Locator","QTY","UnitValue","Reorder","Notes"];
  const lines = [header.join(",")];
  items.forEach(i => {
    lines.push([i.sku, `"${(i.description||"").replace(/"/g,'""')}"`, i.category||"", i.locator||"", i.qty, i.unitValue, i.reorder, ""].join(","));
  });
  return lines.join("\n");
}
function downloadBlob(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function exportCSV() {
  const items = filteredInventory();
  downloadBlob(toCSV(items), `inventory-export-${new Date().toISOString().slice(0,10)}.csv`, "text/csv");
  showToast(`Exported ${items.length} SKU(s) to CSV`, "ok");
}
function exportPDF() {
  if (!window.jspdf) { showToast("PDF library still loading — try again in a moment", "danger"); return; }
  const items = filteredInventory();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(14);
  doc.text("DEPOT/OS — Inventory Export", 14, 16);
  doc.setFontSize(9);
  doc.text(`Generated ${fmt(0)} · ${items.length} SKU(s)`, 14, 22);
  let y = 32;
  doc.setFontSize(8.5);
  const cols = [14, 44, 110, 140, 165, 185];
  const headers = ["SKU","Description","Category","Locator","Qty","Value"];
  doc.setFont(undefined, "bold");
  headers.forEach((h, idx) => doc.text(h, cols[idx], y));
  doc.setFont(undefined, "normal");
  y += 5;
  doc.setDrawColor(200); doc.line(14, y-3.5, 196, y-3.5);
  items.forEach(i => {
    if (y > 280) { doc.addPage(); y = 20; }
    doc.text(String(i.sku), cols[0], y);
    doc.text(String(i.description).slice(0,32), cols[1], y);
    doc.text(String(i.category||"—").slice(0,16), cols[2], y);
    doc.text(String(i.locator), cols[3], y);
    doc.text(String(i.qty), cols[4], y);
    doc.text(`P${i.unitValue}`, cols[5], y);
    y += 6;
  });
  doc.save(`inventory-export-${new Date().toISOString().slice(0,10)}.pdf`);
  showToast(`Exported ${items.length} SKU(s) to PDF`, "ok");
}
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim().length);
  if (lines.length < 2) return [];
  const header = lines[0].split(",").map(h => h.trim().toLowerCase());
  const idx = (name) => header.indexOf(name);
  const rows = [];
  for (let li = 1; li < lines.length; li++) {
    const cells = lines[li].match(/(".*?"|[^,]+)(?=,|$)/g) || [];
    const clean = cells.map(c => c.trim().replace(/^"|"$/g,"").replace(/""/g,'"'));
    const sku = clean[idx("sku")];
    if (!sku) continue;
    rows.push({
      sku,
      description: clean[idx("description")] || "",
      category: idx("category")>-1 ? (clean[idx("category")]||"") : "",
      locator: clean[idx("locator")] || "",
      qty: parseInt(clean[idx("qty")],10) || 0,
      unitValue: parseFloat(clean[idx("unitvalue")]) || 0,
      reorder: parseInt(clean[idx("reorder")],10) || 0,
    });
  }
  return rows;
}
function importCSVFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const rows = parseCSV(e.target.result);
    if (rows.length === 0) { showToast("No valid rows found in that CSV", "danger"); return; }
    let added = 0, updated = 0;
    rows.forEach(r => {
      const existing = state.inventory.find(i => i.sku === r.sku);
      if (existing) {
        Object.assign(existing, r, { category: r.category || existing.category });
        updated++;
      } else {
        if (r.category && !state.categories.includes(r.category)) state.categories.push(r.category);
        state.inventory.push(r);
        added++;
      }
    });
    showToast(`Import complete — ${added} added, ${updated} updated`, "ok");
    render();
  };
  reader.readAsText(file);
}

function saveEditItem() {
  const it = state.editItem;
  const sku = document.getElementById("ei-sku").value.trim();

  const payload = {
    sku,

    unitValue: parseFloat(document.getElementById("ei-value").value) || 0,

function askConfirm(title, message, type, payload, confirmLabel) {
  state.confirm = { title, message, type, payload, confirmLabel };

function runConfirmedAction() {
  const c = state.confirm;
  if (!c) return;
  if (c.type === "reset-qty") {
    state.inventory.forEach(i => i.qty = 0);
    showToast("All quantities reset to 0", "ok");
  } else if (c.type === "delete-item") {
    state.inventory = state.inventory.filter(i => i.sku !== c.payload);
    showToast("Item deleted", "ok");
  } else if (c.type === "delete-locator") {
    state.locators = state.locators.filter(l => l.code !== c.payload);
    showToast("Locator removed", "ok");
  } else if (c.type === "delete-user") {
    state.users = state.users.filter(u => u.id !== c.payload);
    showToast("User removed", "ok");
  } else if (c.type === "delete-category") {
    state.categories = state.categories.filter(cat => cat !== c.payload);
    showToast("Category removed", "ok");
  }
  state.confirm = null;
  render();
}

function submitStock() {
  const validRows = state.rows.filter(r => r.sku && r.qty);
  if (validRows.length === 0) return showToast("Add at least one SKU with quantity", "danger");

  const type = state.stockType;
  let newTx = [];
  let hadError = false;

  validRows.forEach(r => {
    const item = state.inventory.find(i => i.sku === r.sku);
    if (!item) { hadError = true; return; }
    const qty = parseInt(r.qty, 10);
    if (!qty || qty <= 0) { hadError = true; return; }
    if (type === "OUT" && qty > item.qty) {
      showToast(`${r.sku}: not enough stock on hand (${item.qty} available)`, "danger");
      hadError = true; return;
    }
    item.qty = type === "IN" ? item.qty + qty : item.qty - qty;
    newTx.push({
      id: "T-" + Math.floor(1000+Math.random()*9000) + (Date.now()%1000),
      type, sku: r.sku, description: item.description, qty,
      locator: item.locator, notes: r.notes || "—", user: state.session.name,
      value: qty * item.unitValue, timestamp: fmt(0),
    });
  });

  if (newTx.length === 0) {
    if (!hadError) showToast("No valid SKUs found in inventory", "danger");
    return;
  }
  state.transactions.unshift(...newTx);
  state.rows = [{ sku: "", description: "", qty: "", notes: "" }];
  showToast(`${newTx.length} stock ${type==='IN'?'in':'out'} entr${newTx.length>1?'ies':'y'} recorded`, "ok");
}

/* ---------------------------------------------------------
   EVENT HANDLING
--------------------------------------------------------- */
function attachHandlers() {
  const app = document.getElementById("app");

  app.onclick = (e) => {
    // clicking inside a modal shouldn't bubble to its backdrop close handler
    if (e.target.closest("[data-stop]") && e.target.closest("[data-action='close-edit-item'],[data-action='confirm-no']") === null) {
      // continue normal handling below (buttons inside still work)
    }
    const el = e.target.closest("[data-action]");
    if (!el) return;
    // ignore backdrop click if the actual click landed on the modal box
    if ((el.dataset.action === "close-edit-item" || el.dataset.action === "confirm-no") && e.target.closest(".modal")) return;
    const action = el.dataset.action;

    if (action === "set-auth-mode") { state.authMode = el.dataset.mode; render(); }
    else if (action === "set-signup-role") { state._signupRole = el.dataset.role; render(); }
    else if (action === "do-login") {
      const val = document.getElementById("login-username").value.trim();
      doLogin(val);
    }
    else if (action === "do-signup") {
      const payload = {
        name: document.getElementById("su-name").value.trim(),
        username: document.getElementById("su-username").value.trim(),
        email: document.getElementById("su-email").value.trim(),
        role: state._signupRole || "Stock Clerk",
      };
      if (payload.name && payload.username && payload.email) doSignup(payload);
      else showToast("Please complete all fields", "danger");
    }
    else if (action === "do-logout") doLogout();
    else if (action === "set-view") { state.view = el.dataset.view; render(); }
    else if (action === "set-stock-type") { state.stockType = el.dataset.type; render(); }
    else if (action === "add-row") { state.rows.push({ sku:"", description:"", qty:"", notes:"" }); render(); }
    else if (action === "remove-row") {
      const idx = +el.dataset.idx;
      state.rows.splice(idx, 1);
      if (state.rows.length === 0) state.rows.push({ sku:"", description:"", qty:"", notes:"" });
      render();
    }
    else if (action === "submit-stock") submitStock();
    else if (action === "add-locator") {
      const f = state._locForm || {};
      if (!f.code) { showToast("Locator code is required", "danger"); return; }
      if (state.locators.some(l => l.code === f.code)) { showToast("Locator code already exists", "danger"); return; }
      state.locators.push({ code: f.code, zone: f.zone||"", description: f.description||"" });
      state._locForm = { code:"", zone:"", description:"" };
      showToast("Locator added", "ok");
    }
    else if (action === "remove-locator") {
      askConfirm("Remove locator?", `This deletes locator ${el.dataset.code}. Items already assigned to it will keep the code as a label.`, "delete-locator", el.dataset.code, "Remove");
    }
    else if (action === "add-category") {
      const input = document.getElementById("cat-new");
      const val = input.value.trim();
      if (!val) { showToast("Enter a category name", "danger"); return; }
      if (state.categories.includes(val)) { showToast("That category already exists", "danger"); return; }
      state.categories.push(val);
      showToast("Category added", "ok");
      render();
    }
    else if (action === "remove-category") {
      askConfirm("Remove category?", `SKUs currently under "${el.dataset.cat}" will keep the label until reassigned.`, "delete-category", el.dataset.cat, "Remove");
    }
    else if (action === "remove-user") {
      if (el.dataset.id === state.session.id) { showToast("You can't delete your own account while signed in", "danger"); return; }
      askConfirm("Remove user?", "This account will lose access immediately.", "delete-user", el.dataset.id, "Remove");
    }
    else if (action === "save-profile") {
      state.session.name = document.getElementById("pf-name").value.trim();
      state.session.username = document.getElementById("pf-username").value.trim();
      state.session.email = document.getElementById("pf-email").value.trim();
      const u = state.users.find(u => u.id === state.session.id);
      if (u) Object.assign(u, { name: state.session.name, username: state.session.username, email: state.session.email });
      showToast("Profile updated", "ok");
      render();
    }
    else if (action === "set-tx-tab") { state.txTab = el.dataset.tab; state.txPage = 1; render(); }
    else if (action === "tx-prev") { state.txPage = Math.max(1, state.txPage-1); render(); }
    else if (action === "tx-next") { state.txPage += 1; render(); }
    else if (action === "lookup-prev") { state.lookupPage = Math.max(1, state.lookupPage-1); updateLookupResults(); }
    else if (action === "lookup-next") { state.lookupPage += 1; updateLookupResults(); }
    else if (action === "toggle-team-panel") {
      state.teamPanelOpen = !state.teamPanelOpen;
      if (state.teamPanelOpen && !state._notifiedRetention) {
        state._notifiedRetention = true;
        showToast("Heads up: direct messages auto-delete after 3 months.", "ok");
      }
      render();
    }
    else if (action === "close-team-panel") { state.teamPanelOpen = false; state.chatWith = null; render(); }
    else if (action === "open-chat") { state.chatWith = el.dataset.id; render(); }
    else if (action === "back-to-team-list") { state.chatWith = null; render(); }
    else if (action === "send-message") {
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text) return;
      state.messages.push({ id: "m"+Date.now(), from: state.session.id, to: state.chatWith, text, timestamp: fmt(0) });
      render();
    }
    else if (action === "trigger-import") document.getElementById("import-file").click();
    else if (action === "export-csv") exportCSV();
    else if (action === "export-pdf") exportPDF();
    else if (action === "open-add-item") openEditItem(null);
    else if (action === "edit-item") openEditItem(el.dataset.sku);
    else if (action === "delete-item") askConfirm("Delete this SKU?", `${el.dataset.sku} will be permanently removed from inventory.`, "delete-item", el.dataset.sku, "Delete");
    else if (action === "reset-qty") askConfirm("Reset all quantities?", "Every SKU's on-hand quantity will be set to 0. This can't be undone from here.", "reset-qty", null, "Reset all");
    else if (action === "close-edit-item") { state.editItem = null; render(); }
    else if (action === "save-edit-item") saveEditItem();
    else if (action === "confirm-yes") runConfirmedAction();
    else if (action === "confirm-no") { state.confirm = null; render(); }
  };

  app.onchange = (e) => {
    if (e.target.id === "bulk-toggle") { state.bulk = e.target.checked; render(); }
    else if (e.target.id === "lookup-loc") { state.lookupLoc = e.target.value; state.lookupPage = 1; updateLookupResults(); }
    else if (e.target.id === "lookup-cat") { state.lookupCat = e.target.value; state.lookupPage = 1; updateLookupResults(); }
    else if (e.target.id === "import-file") {
      if (e.target.files && e.target.files[0]) importCSVFile(e.target.files[0]);
      e.target.value = "";
    }
    else if (e.target.dataset.action === "change-role") {
      const u = state.users.find(u => u.id === e.target.dataset.id);
      if (u) { u.role = e.target.value; showToast("Access level updated", "ok"); }
    }
  };

  app.oninput = (e) => {
    if (e.target.id === "lookup-q") { state.lookupQ = e.target.value; state.lookupPage = 1; updateLookupResults(); }
    else if (e.target.id === "loc-code" || e.target.id === "loc-zone" || e.target.id === "loc-desc") {
      state._locForm = state._locForm || { code:"", zone:"", description:"" };
      if (e.target.id === "loc-code") state._locForm.code = e.target.value;
      if (e.target.id === "loc-zone") state._locForm.zone = e.target.value;
      if (e.target.id === "loc-desc") state._locForm.description = e.target.value;
    }
    else if (e.target.classList.contains("row-sku") || e.target.classList.contains("row-desc") || e.target.classList.contains("row-qty") || e.target.classList.contains("row-notes")) {
      const idx = +e.target.dataset.idx;
      const field = e.target.dataset.field;
      state.rows[idx][field] = e.target.value;
      if (field === "sku") {
        const item = state.inventory.find(i => i.sku === e.target.value);
        if (item) { state.rows[idx].description = item.description; render(); refocus(`.row-sku[data-idx="${idx}"]`, true); }
      }
    }
  };

  app.onkeydown = (e) => {
    if (e.key === "Enter" && e.target.id === "chat-input") {
      e.preventDefault();
      document.querySelector('[data-action="send-message"]')?.click();
    }
  };
}

function refocus(idOrSelector, isSelector) {
  requestAnimationFrame(() => {
    const el = isSelector ? document.querySelector(idOrSelector) : document.getElementById(idOrSelector);
    if (el) { el.focus(); const v = el.value; el.value=""; el.value=v; }
  });
}

render();
</script>
</body>
</html>
